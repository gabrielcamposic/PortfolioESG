<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>06 — Risco & Diagnóstico</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-card: #1a1d27;
    --border: #2a2e3d;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0ac;
    --text-muted: #636978;
    --accent-blue: #4dabf7;
    --accent-green: #51cf66;
    --accent-red: #ff6b6b;
    --accent-yellow: #ffd43b;
    --accent-orange: #ff922b;
    --accent-purple: #cc5de8;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-sans);
    padding: 16px;
  }

  .section-title {
    font-size: 16px; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display: inline-block; width: 3px; height: 18px;
    background: var(--accent-blue); border-radius: 2px;
  }

  .sub-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 14px;
  }

  /* ── Metric cards grid ── */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .metric-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .metric-card .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .metric-card .value {
    font-size: 20px; font-weight: 700; font-family: var(--font-mono);
    color: var(--text-primary);
  }
  .metric-card .value.positive { color: var(--accent-green); }
  .metric-card .value.negative { color: var(--accent-red); }
  .metric-card .hint {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
  }

  /* ── Attribution card ── */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; margin-bottom: 16px;
  }

  .attr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .attr-bars { display: flex; flex-direction: column; gap: 12px; }

  .bar-item { display: flex; flex-direction: column; gap: 4px; }
  .bar-label {
    font-size: 12px; color: var(--text-secondary);
    display: flex; justify-content: space-between;
  }
  .bar-label .val { font-family: var(--font-mono); font-weight: 600; }
  .bar-track {
    height: 8px; background: rgba(42,46,61,0.6); border-radius: 4px;
    overflow: hidden; position: relative;
  }
  .bar-fill {
    height: 100%; border-radius: 4px; transition: width 0.5s ease;
    position: absolute; top: 0;
  }

  .chart-container { position: relative; height: 200px; }

  .loading { color: var(--text-muted); font-style: italic; font-size: 13px; }

  @media (max-width: 640px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .attr-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="section-title">Risco & Diagnóstico</div>

<div id="metrics-area"><span class="loading">Carregando métricas...</span></div>

<div class="card" id="attribution-card" style="display:none">
  <div class="sub-title">Atribuição de Performance (Brinson)</div>
  <div class="attr-grid">
    <div class="attr-bars" id="attr-bars"></div>
    <div class="chart-container"><canvas id="attr-chart"></canvas></div>
  </div>
</div>

<script>
const DATA_BASE = '../data';

function fmtNum(v, d = 4) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(d);
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v * 100).toFixed(2) + '%';
}

function colorClass(v) {
  if (v == null || isNaN(v)) return '';
  return v >= 0 ? 'positive' : 'negative';
}

async function fetchJSON(file) {
  const r = await fetch(`${DATA_BASE}/${file}`);
  if (!r.ok) throw new Error(`${file}: ${r.status}`);
  return r.json();
}

function metricCard(label, value, hint = '', cls = '') {
  return `<div class="metric-card">
    <div class="label">${label}</div>
    <div class="value ${cls}">${value}</div>
    ${hint ? `<div class="hint">${hint}</div>` : ''}
  </div>`;
}

async function render() {
  try {
    const [dashboard, attribution] = await Promise.all([
      fetchJSON('dashboard_latest.json'),
      fetchJSON('performance_attribution.json'),
    ]);

    const rel = dashboard.real?.relative || {};
    const str = dashboard.real?.structure || {};
    const port = dashboard.real?.portfolio || {};

    // ── Metric cards ──
    let html = `<div class="sub-title">Métricas de Risco</div><div class="metrics-grid">`;
    html += metricCard('Beta', fmtNum(rel.beta, 4), 'vs benchmark', rel.beta > 1 ? 'negative' : '');
    html += metricCard('Tracking Error', fmtPct(rel.tracking_error), 'anualizado');
    html += metricCard('Info Ratio', fmtNum(rel.information_ratio, 4), 'retorno ativo / TE', colorClass(rel.information_ratio));
    html += metricCard('Correlação', fmtNum(rel.correlation, 4), 'vs benchmark');
    html += metricCard('Max Drawdown', fmtPct(port.max_drawdown), 'pior queda', 'negative');
    html += metricCard('Calmar', fmtNum(port.calmar, 4), 'retorno / drawdown', colorClass(port.calmar));
    html += `</div>`;

    html += `<div class="sub-title" style="margin-top:20px">Estrutura do Portfólio</div><div class="metrics-grid">`;
    html += metricCard('Nº Ativos', str.n_assets || '—', '');
    html += metricCard('HHI', fmtNum(str.hhi, 4), str.hhi > 0.25 ? 'concentrado' : 'diversificado');
    html += metricCard('Top 3', fmtPct(str.top3), 'do portfólio');
    html += metricCard('Top 5', fmtPct(str.top5), 'do portfólio');
    html += `</div>`;

    document.getElementById('metrics-area').innerHTML = html;

    // ── Attribution (Brinson) ──
    if (attribution) {
      const attrCard = document.getElementById('attribution-card');
      attrCard.style.display = 'block';

      const items = [
        { label: 'Efeito Alocação', value: attribution.allocation_effect, color: '#4dabf7' },
        { label: 'Efeito Seleção', value: attribution.selection_effect, color: '#51cf66' },
        { label: 'Efeito Interação', value: attribution.interaction_effect, color: '#ff922b' },
        { label: 'Retorno Ativo Total', value: attribution.total_active_return, color: '#cc5de8' },
      ];

      // Find max absolute value for bar scaling
      const maxAbs = Math.max(...items.map(i => Math.abs(i.value || 0)), 1);

      let barsHTML = '';
      for (const item of items) {
        const v = item.value || 0;
        const pct = (Math.abs(v) / maxAbs) * 100;
        const cls = v >= 0 ? 'positive' : 'negative';
        const left = v >= 0 ? '50%' : `${50 - pct / 2}%`;
        const width = `${pct / 2}%`;
        barsHTML += `<div class="bar-item">
          <div class="bar-label">
            <span>${item.label}</span>
            <span class="val ${cls}">${v.toFixed(2)}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="left:${left};width:${width};background:${item.color}"></div>
          </div>
        </div>`;
      }
      document.getElementById('attr-bars').innerHTML = barsHTML;

      // Pie chart
      const pieItems = items.slice(0, 3); // allocation, selection, interaction
      new Chart(document.getElementById('attr-chart').getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: pieItems.map(i => i.label),
          datasets: [{
            data: pieItems.map(i => Math.abs(i.value || 0)),
            backgroundColor: pieItems.map(i => i.color),
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '50%',
          plugins: {
            legend: {
              display: false,
            },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const orig = items[ctx.dataIndex].value;
                  return `${ctx.label}: ${orig?.toFixed(2)}%`;
                }
              }
            }
          }
        }
      });
    }

  } catch (err) {
    console.error('Risk error:', err);
    document.getElementById('metrics-area').innerHTML =
      `<span class="loading" style="color:var(--accent-red)">Erro: ${err.message}</span>`;
  }
}

render();
</script>
</body>
</html>
