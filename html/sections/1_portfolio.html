<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 — Portfólio</title>
<link rel="stylesheet" href="../css/base.css">
<script src="../js/header.js" data-page="portfolio"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  /* ── Dashboard Layout Grids ── */
  .cards-vertical {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .cards-vertical .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;
  }
  .cards-vertical .card:hover {
    transform: translateX(4px);
    border-color: var(--accent-blue);
    box-shadow: var(--shadow-md);
  }
  .cards-vertical .card .label-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .cards-vertical .card .label { font-size: 8px; margin-bottom: 0; }
  .cards-vertical .card .value { font-size: 18px; line-height: 1; }
  .cards-vertical .card .sub { font-size: 9px; margin-top: 2px; line-height: 1.2; }
  
  .dashboard-grid {
    display: grid;
    gap: 16px;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeInUp 0.6s ease forwards;
  }
  
  /* Desktop Layouts */
  @media (min-width: 1024px) {
    .dashboard-grid.layout-hero {
      grid-template-columns: 160px 1fr;
      align-items: stretch;
    }
    .dashboard-grid.layout-split {
      grid-template-columns: 1fr 1fr;
      align-items: start;
    }
    .dashboard-grid.layout-top {
      grid-template-columns: 2fr 1fr;
      align-items: start;
    }
  }

  /* ── Card / Block Common Base ── */
  .chart-card, .perf-table-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }

  .chart-title, .table-title {
    font-size: 9px;
    font-weight: var(--font-weight-emphasis);
    color: var(--color-label);
    margin-bottom: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
    padding-left: 0;
    border-left: 4px solid var(--brand-red);
    padding: 2px 0 2px 12px;
  }

  /* ── Charts ── */
  .chart-wrapper { position: relative; height: 420px; width: 100%; }
  
  .chart-perf-overlay {
    position: absolute;
    top: 15px;
    left: 15px; /* Will be adjusted by JS */
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 10px;
    z-index: 10;
    box-shadow: var(--shadow-sm);
    pointer-events: none;
  }
  .chart-perf-overlay table { border-collapse: collapse; }
  .chart-perf-overlay th { text-align: left; color: var(--color-label); padding-right: 12px; font-weight: 600; padding-bottom: 4px; }
  .chart-perf-overlay td { text-align: right; padding: 2px 8px; font-weight: 600; }
  .chart-perf-overlay .win-label { color: var(--text-secondary); text-align: left; padding-left: 0; font-weight: 400; }
  .chart-perf-overlay .val-p { color: var(--brand-blue); }
  .chart-perf-overlay .val-b { color: #64748b; }
  .chart-perf-overlay .val-c { color: #1e293b; }
  
  .legend-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .legend-indicator.dash {
    width: 10px;
    height: 2px;
    border-radius: 1px;
    border-bottom: 2px dashed currentColor;
    background: none !important;
  }

  /* ── Performance table ── */
  .perf-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-sans);
    font-size: 13px;
  }
  .perf-table th {
    text-align: right;
    font-weight: var(--font-weight-emphasis);
    color: var(--color-label);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-strong);
  }
  .perf-table th:first-child { text-align: left; }
  .perf-table td {
    text-align: right;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-weight: 500;
  }
  .perf-table td:first-child {
    text-align: left;
    color: var(--brand-blue);
    font-weight: var(--font-weight-emphasis);
    font-size: 13px;
    font-family: var(--font-sans);
  }
  
  .perf-table td.pos { color: var(--brand-blue); }
  .perf-table td.neg { color: var(--brand-magenta); }

  .perf-table tr.totals td { background: var(--bg-card-alt); color: var(--text-primary); font-weight: var(--font-weight-emphasis); border-top: 2px solid var(--border-strong); }
  .perf-table td.gold { color: var(--accent-gold); font-weight: var(--font-weight-emphasis); border: 1px solid var(--accent-gold); border-radius: 8px; }

  /* ── Monthly returns table (TWR) ── */
  .perf-table tr.total-row td {
    background: var(--bg-card-alt);
    color: var(--text-primary);
    font-weight: var(--font-weight-emphasis);
    padding: 10px 12px;
    border-top: 2px solid var(--border-strong);
  }

  /* ── Responsive ── */
  @media (max-width: 1023px) {
    .dashboard-grid { grid-template-columns: 1fr; }
    .cards-vertical {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .bar-chart-wrapper { height: 320px; }
  }
  @media (max-width: 640px) {
    .cards-vertical { grid-template-columns: 1fr; }
    .chart-card, .perf-table-card { padding: 20px; }
    .chart-wrapper { height: 320px; }
  }
</style>

</head>
<body>

<div class="period-header" id="period-header"></div>

<!-- Top Tables Side-by-Side -->
<div class="dashboard-grid layout-top" style="margin-bottom: 16px;">
  <!-- Composition Table -->
  <div class="chart-card">
    <div class="chart-title">Composição da Carteira Atual</div>
    <div id="composition-table-container"><span class="loading">Carregando composição...</span></div>
  </div>

  <!-- Monthly TWR returns table -->
  <div class="chart-card" style="overflow-y: auto;">
    <div class="chart-title" style="margin-bottom: 12px;">Rentabilidade Mensal — TWR</div>
    <div id="monthly-returns-container"><span class="loading">Carregando rentabilidade...</span></div>
  </div>
</div>

<div class="dashboard-grid layout-hero" style="margin-bottom: 16px;">
  <!-- Left Column: Cards Vertical -->
  <div class="cards-vertical" id="cards-snapshot">
    <div class="card"><span class="loading">Carregando...</span></div>
  </div>

  <!-- Right Column: Line chart with integrated metrics -->
  <div class="chart-card" style="margin-bottom: 0; position: relative;">
    <div class="chart-title">Evolução base 100 — Portfólio vs Ibovespa vs CDI</div>
    <div class="chart-wrapper">
      <div id="perf-chart-overlay" class="chart-perf-overlay"></div>
      <canvas id="perf-chart"></canvas>
    </div>
  </div>
</div>


<script type="module">
import { DC, plColor, assetColor } from '../js/data-colors.js';

const DATA_BASE = '../data';

function fmtBRL(v) {
  if (v == null || isNaN(v)) return '—';
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function fmtPct(v, d = 1) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + (v * 100).toFixed(d) + '%';
}
function fmtNum(v, d = 1) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(d);
}
function card(label, value, colorHex, sub, tooltipText, valueStyle = "") {
  const tooltipHtml = tooltipText ? `<div class="tooltip-icon" data-tooltip="${tooltipText}">?</div>` : '';
  const style = colorHex ? `color: ${colorHex}; ${valueStyle}` : valueStyle;
  
  return `<div class="card">
    <div class="label-container">
      <div class="label">${label}</div>
      ${tooltipHtml}
    </div>
    <div class="value" style="${style}">${value}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

function parseCSV(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete: r => resolve(r.data), error: e => reject(e),
    });
  });
}

async function render() {
  try {
    const [dashboard, dailyRows, positions] = await Promise.all([
      fetch(`${DATA_BASE}/dashboard_latest.json`).then(r => r.json()),
      parseCSV(`${DATA_BASE}/portfolio_real_daily.csv`),
      fetch(`${DATA_BASE}/ledger_positions.json`).then(r => r.json()).catch(() => null),
    ]);

    const real = dashboard.real || {};
    const snap = real.snapshot || {};
    const twr  = real.twr || {};
    const bench = real.benchmark || {};
    const cdi  = real.cdi || {};
    const alpha = real.alpha || {};
    const meta = real.meta || {};
    const perf = real.performance || {};
    const safe = meta.annualize_safe;

    const model = dashboard.model || {};
    const mRet = model.returns || {};

    const pctCdiStr = cdi.pct_of_cdi != null ? (cdi.pct_of_cdi * 100).toFixed(1) + '%' : '—';

    // ── Period header ──
    const MO = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    if (meta.history_start && meta.history_end) {
      const [sy,sm] = meta.history_start.split('-');
      const [ey,em] = meta.history_end.split('-');
      document.getElementById('period-header').innerHTML =
        `Período de análise · <span class="dates">${MO[+sm-1]}/${sy.slice(2)} – ${MO[+em-1]}/${ey.slice(2)} · ${meta.trading_days||'?'} pregões</span>`;
    }

    // ── Row 1: Snapshot cards (Mini) ──
    document.getElementById('cards-snapshot').innerHTML =
      card('Exp. 12M (Atual)', fmtPct(mRet.hold_12m / 100), plColor(mRet.hold_12m / 100), 'retorno esperado', 'Projeção (Forward Looking): Retorno matemático esperado da carteira atual (sem rebalanceamento) em 12 meses') +
      card('% do CDI', pctCdiStr, DC.portfolio.line, `CDI ${fmtPct(cdi.total_return)} no período`, 'Quanto o seu TWR representa sobre o rendimento do CDI no período (objetivo: >100%)') +
      card('Volatilidade', fmtPct(twr.volatility), '', `sharpe <span style="color: ${DC.portfolio.line}">${fmtNum(twr.sharpe)}</span>`, 'Risco: quanto a carteira oscila. Sharpe indica se esse risco compensou sobre o CDI livre de risco.') +
      card('Alpha vs Ibov', fmtPct(alpha.total), plColor(alpha.total), 'TWR − bench', 'Alpha: Quanto sua carteira rendeu de prêmio (a mais ou a menos) contra o Ibovespa');

    // ── Integrated Performance Overlay ──
    const wins = ['YTD','6M','12M','24M'];
    let overlayHtml = `<table>
      <thead>
        <tr>
          <th>Janela</th>
          <th class="val-p"><span class="legend-indicator" style="background: ${DC.portfolio.line}"></span>Port</th>
          <th class="val-b"><span class="legend-indicator dash" style="color: ${DC.ibov.line}"></span>Ibov</th>
          <th class="val-c"><span class="legend-indicator dash" style="color: ${DC.cdi.line}"></span>CDI</th>
        </tr>
      </thead>
      <tbody>`;
    wins.forEach(w => {
      if (perf[w]) {
        overlayHtml += `<tr>
          <td class="win-label">${w}</td>
          <td class="val-p">${fmtPct(perf[w].portfolio, 1)}</td>
          <td class="val-b">${fmtPct(perf[w].benchmark, 1)}</td>
          <td class="val-c">${fmtPct(perf[w].cdi, 1)}</td>
        </tr>`;
      }
    });
    overlayHtml += '</tbody></table>';
    document.getElementById('perf-chart-overlay').innerHTML = overlayHtml;

    // ── Line chart: Portfolio vs Ibovespa vs CDI, base 100 ──
    if (dailyRows.length > 0) {
      const labels = [dailyRows[0].date];
      const pS = [100], bS = [100], cS = [100];
      let pB = 100, bB = 100, cB = 100;

      for (let i = 1; i < dailyRows.length; i++) {
        const r = dailyRows[i];
        labels.push(r.date);
        const pr = parseFloat(r.portfolio_return);
        const br = parseFloat(r.benchmark_return);
        const cr = parseFloat(r.cdi_return);
        pB *= isNaN(pr)?1:(1+pr); bB *= isNaN(br)?1:(1+br); cB *= isNaN(cr)?1:(1+cr);
        pS.push(pB); bS.push(bB); cS.push(cB);
      }

      // Find marker indices
      const last = dailyRows[dailyRows.length-1].date;
      const ytdStart = last.slice(0,4) + '-01-01';
      const ytdIdx = dailyRows.findIndex(r => r.date >= ytdStart);
      
      const twelveM = new Date(last); twelveM.setFullYear(twelveM.getFullYear()-1);
      const twelveMStr = twelveM.toISOString().slice(0,10);
      const twelveMIdx = dailyRows.findIndex(r => r.date >= twelveMStr);

      new Chart(document.getElementById('perf-chart').getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label:'Portfólio', data:pS, borderColor: DC.portfolio.line, backgroundColor: DC.portfolio.area,
              fill:true, borderWidth:3, pointRadius:0, pointHitRadius:8, tension:0.15 },
            { label:'Ibovespa', data:bS, borderColor: DC.ibov.line, borderWidth:1.5,
              borderDash: DC.ibov.dash, pointRadius:0, pointHitRadius:8, tension:0.15, fill:false },
            { label:'CDI', data:cS, borderColor: DC.cdi.line, borderWidth:1.5,
              borderDash: DC.cdi.dash, pointRadius:0, pointHitRadius:8, tension:0, fill:false },
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          interaction: { mode: 'index', intersect: false },
          layout: { padding: { right: 50, top: 30 } },
          scales: {
            x: { 
              grid: { display:false }, 
              ticks: { 
                color:'var(--text-muted)', 
                font:{size:9, weight: 600}, 
                maxRotation:0,
                autoSkip: true,
                maxTicksLimit: 8,
                callback: function(v) {
                  const d = labels[v];
                  if (!d) return '';
                  const parts = d.split('-');
                  return parts[1] + '/' + parts[0].slice(2);
                }
              } 
            },
            y: { 
              position: 'left',
              grid: { color:'rgba(0,0,0,0.04)' },
              ticks: { color:'var(--text-muted)', font:{size:10, family:'var(--font-mono)'} }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor:'rgba(15, 23, 42, 0.95)', padding: 12, cornerRadius: 10,
              titleColor:'#ffffff', bodyColor:'#e2e8f0',
              titleFont:{weight:600}, bodyFont:{family:"var(--font-mono)",size:11},
              displayColors: true, boxPadding: 6,
              callbacks: {
                label: (ctx) => {
                  const val = ctx.parsed.y;
                  const ret = ((val/100)-1)*100;
                  return `${ctx.dataset.label}: ${val.toFixed(2)} (${ret >= 0 ? '+' : ''}${ret.toFixed(1)}%)`;
                }
              }
            }
          }
        },
        plugins: [{
          id: 'customMarkers',
          afterDraw(chart) {
            const {ctx, scales: {x, y}} = chart;
            
            // Sync overlay position with Y axis width
            const overlay = document.getElementById('perf-chart-overlay');
            if (overlay) {
              overlay.style.left = (y.right + 10) + 'px';
            }

            ctx.save();
            
            const markers = [
              { idx: ytdIdx, label: 'YTD' },
              { idx: twelveMIdx, label: '12M' }
            ];

            markers.forEach(m => {
              if (m.idx > 0 && m.idx < labels.length) {
                const xPos = x.getPixelForValue(m.idx);
                ctx.beginPath();
                ctx.setLineDash([5, 5]);
                ctx.moveTo(xPos, y.top);
                ctx.lineTo(xPos, y.bottom);
                ctx.strokeStyle = 'rgba(138, 122, 101, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.fillStyle = 'var(--color-label)';
                ctx.font = '600 9px var(--font-sans)';
                ctx.textAlign = 'center';
                ctx.fillText(m.label, xPos, y.bottom - 10);
              }
            });

            // End of line labels
            chart.data.datasets.forEach((dataset, i) => {
              const meta = chart.getDatasetMeta(i);
              const lastPoint = meta.data[meta.data.length - 1];
              if (lastPoint) {
                ctx.fillStyle = dataset.borderColor;
                ctx.font = 'bold 10px var(--font-mono)';
                ctx.textAlign = 'left';
                const val = dataset.data[dataset.data.length-1];
                ctx.fillText(` ${val.toFixed(1)}`, lastPoint.x, lastPoint.y);
              }
            });
            
            ctx.restore();
          }
        }]
      });
    }

    // ── Monthly TWR returns table ──
    const mr = real.monthly_returns || {};
    const meses = mr.meses || [];
    if (meses.length > 0) {
      const MO_LABEL = {
        '01':'Jan','02':'Fev','03':'Mar','04':'Abr','05':'Mai','06':'Jun',
        '07':'Jul','08':'Ago','09':'Set','10':'Out','11':'Nov','12':'Dez'
      };
      function mesLabel(m) {
        const [y, mo] = m.split('-');
        return `${MO_LABEL[mo] || mo}/${y.slice(2)}`;
      }

      let html = '<table class="perf-table"><thead><tr>';
      html += '<th style="text-align:left; width: 60px;">Mês</th><th>Retorno</th><th>CDI</th><th>Acum.</th>';
      html += '</tr></thead><tbody>';

      const mesesInvertidos = [...meses].reverse();
      for (const m of mesesInvertidos) {
        const ret = m.retorno_mes;
        const cdiVal = m.retorno_cdi;
        const acum = m.retorno_acumulado;
        const isGap = m.pregoes === 0;
        
        const retColor = isGap ? DC.neutral.line : plColor(ret);
        const acumColor = isGap ? DC.neutral.line : plColor(acum);

        html += `<tr>
          <td>${mesLabel(m.mes)}</td>
          <td style="color: ${retColor}">${isGap ? '—' : fmtPct(ret)}</td>
          <td>${cdiVal != null && !isGap ? fmtPct(cdiVal) : '—'}</td>
          <td style="color: ${acumColor}">${fmtPct(acum)}</td>
        </tr>`;
      }

      const twrTotal = mr.twr_total;
      const cdiTotal = mr.cdi_total;
      const twrColor = plColor(twrTotal);
      html += `<tr class="total-row">
        <td><strong>Total</strong></td>
        <td style="color: ${twrColor}"><strong>${fmtPct(twrTotal)}</strong></td>
        <td>${cdiTotal != null ? fmtPct(cdiTotal) : '—'}</td>
        <td style="color: ${twrColor}"><strong>${fmtPct(twrTotal)}</strong></td>
      </tr>`;


      html += '</tbody></table>';
      document.getElementById('monthly-returns-container').innerHTML = html;
    }

    // ── Current Portfolio Composition ──
    const totalMkt = positions?.total_current_market || 0;
    if (positions && positions.positions && positions.positions.length > 0 && totalMkt > 0) {
      const holdings = positions.positions
        .map(p => {
          const symbol = (p.resolved_symbol || p.symbol || '').replace('.SA', '');
          const mktVal = p.net_qty * p.current_price;
          const weight = mktVal / totalMkt;
          const avgCost = p.net_qty > 0 ? p.net_invested / p.net_qty : 0;
          const pl = mktVal - p.net_invested;
          const plPct = p.net_invested > 0 ? pl / p.net_invested : 0;
          return { symbol, qty: p.net_qty, avgCost, currentPrice: p.current_price, targetPrice: p.target_price, mktVal, weight, pl, plPct };
        })
        .filter(h => h.weight > 0)
        .sort((a, b) => b.weight - a.weight);

      const holdingsTickers = holdings.map(h => h.symbol);

      let html = `<table class="perf-table" style="text-align: right;">
        <thead><tr>
          <th style="text-align: left;">Ativo</th>
          <th>Peso</th>
          <th>Qtd</th>
          <th>Preço</th>
          <th>Mercado</th>
          <th>P&L</th>
          <th>%</th>
        </tr></thead><tbody>`;

      for (const h of holdings) {
        const plC = plColor(h.plPct);
        const tickerC = assetColor(h.symbol, holdingsTickers);
        html += `<tr>
          <td style="font-family: var(--font-sans); font-weight: 600; color: ${tickerC}; text-align: left;">${h.symbol}</td>
          <td>${(h.weight * 100).toFixed(1)}%</td>
          <td>${h.qty}</td>
          <td>${fmtBRL(h.currentPrice)}</td>
          <td>${fmtBRL(h.mktVal)}</td>
          <td style="color: ${plC}">${fmtBRL(h.pl)}</td>
          <td style="color: ${plC}">${fmtPct(h.plPct)}</td>
        </tr>`;
      }

      const totalInvested = holdings.reduce((s, h) => s + (h.avgCost * h.qty), 0);
      const totalMktVal = holdings.reduce((s, h) => s + h.mktVal, 0);
      const totalPL = totalMktVal - totalInvested;
      const totalPLpct = totalInvested > 0 ? totalPL / totalInvested : 0;
      const totalPLc = plColor(totalPLpct);
      html += `<tr style="border-top: 2px solid var(--border-strong); font-weight: 600; font-family: var(--font-sans);">
        <td style="text-align: left;">Total</td>
        <td>100%</td>
        <td></td>
        <td></td>
        <td>${fmtBRL(totalMktVal)}</td>
        <td style="color: ${totalPLc}">${fmtBRL(totalPL)}</td>
        <td style="color: ${totalPLc}">${fmtPct(totalPLpct)}</td>
      </tr>`;


      html += `</tbody></table>`;
      document.getElementById('composition-table-container').innerHTML = html;
    } else {
      document.getElementById('composition-table-container').innerHTML = '<span class="loading">Nenhuma posição atual encontrada.</span>';
    }

  } catch (err) {
    document.getElementById('cards-snapshot').innerHTML =
      `<div class="card"><span class="loading" style="color:var(--accent-red)">Erro: ${err.message}</span></div>`;
  }
}

render();
</script>
</body>
</html>
