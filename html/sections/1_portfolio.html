<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 — Portfólio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<script src="../js/header.js" data-page="portfolio"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  /* ── Dashboard Layout Grids ── */
  .cards-vertical {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .cards-vertical .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  
  .dashboard-grid {
    display: grid;
    gap: 16px;
    margin-bottom: 16px;
  }
  
  /* Desktop Layouts */
  @media (min-width: 1024px) {
    .dashboard-grid.layout-hero {
      grid-template-columns: 240px 1fr;
      align-items: stretch;
    }
    .dashboard-grid.layout-split {
      grid-template-columns: 1fr 1fr; /* 50% / 50% */
      align-items: start;
    }
  }

  /* ── Card / Block Common Base ── */
  .chart-card, .perf-table-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow-sm);
  }

  .chart-title, .table-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 16px;
    letter-spacing: -0.2px;
  }

  /* ── Charts ── */
  .chart-wrapper { position: relative; height: 420px; width: 100%; }
  .bar-chart-wrapper { position: relative; height: 420px; width: 100%; }

  /* ── Performance table ── */
  .perf-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .perf-table th {
    text-align: right;
    font-weight: 600;
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    border-bottom: 2px solid var(--border);
  }
  .perf-table th:first-child { text-align: left; }
  .perf-table td {
    text-align: right;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
  }
  .perf-table td:first-child {
    text-align: left;
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 13px;
  }
  .perf-table td.pos { color: var(--accent-green); }
  .perf-table td.neg { color: var(--accent-red); }
  .perf-table td.gold { color: var(--accent-gold); font-weight: 700; }
  .perf-table tr:last-child td { border-bottom: none; }

  /* ── Monthly returns table (TWR) ── */
  .perf-table tr.total-row td {
    border-top: 2px solid var(--border);
    font-weight: 700;
    padding-top: 12px;
    background: var(--bg-card-alt);
  }
  .perf-table td.gap {
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Responsive ── */
  @media (max-width: 1023px) {
    .dashboard-grid { grid-template-columns: 1fr; }
    .cards-vertical {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }
    .bar-chart-wrapper { height: 280px; }
  }
  @media (max-width: 800px) {
    .cards-vertical { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .cards-row { grid-template-columns: 1fr; }
    .chart-wrapper { height: 300px; }
    .chart-card, .perf-table-card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="period-header" id="period-header"></div>

<!-- Current Portfolio Composition -->
<div class="chart-card" style="margin-bottom: 16px;">
  <div class="chart-title">Composição da Carteira Atual</div>
  <div id="composition-table-container"><span class="loading">Carregando composição...</span></div>
</div>

<div class="dashboard-grid layout-hero" style="margin-bottom: 16px;">
  <!-- Left Column: Cards Vertical -->
  <div class="cards-vertical" id="cards-snapshot">
    <div class="card"><span class="loading">Carregando...</span></div>
  </div>

  <!-- Right Column: Line chart -->
  <div class="chart-card" style="margin-bottom: 0;">
    <div class="chart-title">Evolução base 100 — Portfólio vs Ibovespa vs CDI</div>
    <div class="chart-wrapper">
      <canvas id="perf-chart"></canvas>
    </div>
  </div>
</div>

<!-- Split Grid (50/50): Bar Chart + Monthly Table -->
<div class="dashboard-grid layout-split">
  <!-- Bar chart -->
  <div class="chart-card" style="height: 480px; display: flex; flex-direction: column;">
    <div class="chart-title" style="flex-shrink: 0;">Retorno por Janela</div>
    <div class="bar-chart-wrapper" style="flex: 1;">
      <canvas id="bar-chart"></canvas>
    </div>
  </div>

  <!-- Monthly TWR returns table -->
  <div class="chart-card" style="height: 480px; overflow-y: auto;">
    <div class="chart-title" style="margin-bottom: 12px; position: sticky; top: 0; background: var(--bg-card); z-index: 5;">Rentabilidade Mensal — TWR</div>
    <div id="monthly-returns-container"></div>
  </div>
</div>

<script>
const DATA_BASE = '../data';

function fmtBRL(v) {
  if (v == null || isNaN(v)) return '—';
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + '%';
}
function fmtNum(v, d = 2) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(d);
}
function cls(v) {
  if (v == null || isNaN(v)) return '';
  return v >= 0 ? 'positive' : 'negative';
}
function card(label, value, colorCls, sub, tooltipText) {
  const tooltipHtml = tooltipText ? `<div class="tooltip-icon" data-tooltip="${tooltipText}">?</div>` : '';
  return `<div class="card">
    <div class="label-container">
      <div class="label">${label}</div>
      ${tooltipHtml}
    </div>
    <div class="value ${colorCls}">${value}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}
function parseCSV(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete: r => resolve(r.data), error: e => reject(e),
    });
  });
}

async function render() {
  try {
    const [dashboard, dailyRows, positions] = await Promise.all([
      fetch(`${DATA_BASE}/dashboard_latest.json`).then(r => r.json()),
      parseCSV(`${DATA_BASE}/portfolio_real_daily.csv`),
      fetch(`${DATA_BASE}/ledger_positions.json`).then(r => r.json()).catch(() => null),
    ]);

    const real = dashboard.real || {};
    const snap = real.snapshot || {};
    const twr  = real.twr || {};
    const bench = real.benchmark || {};
    const cdi  = real.cdi || {};
    const alpha = real.alpha || {};
    const meta = real.meta || {};
    const perf = real.performance || {};
    const safe = meta.annualize_safe;

    const model = dashboard.model || {};
    const mRet = model.returns || {};

    // ── Period header ──
    const MO = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    if (meta.history_start && meta.history_end) {
      const [sy,sm] = meta.history_start.split('-');
      const [ey,em] = meta.history_end.split('-');
      document.getElementById('period-header').innerHTML =
        `Período de análise · <span class="dates">${MO[+sm-1]}/${sy.slice(2)} – ${MO[+em-1]}/${ey.slice(2)} · ${meta.trading_days||'?'} pregões</span>`;
    }

    // ── Row 1: Snapshot cards (Mini) ──
    const pctCdi = twr.pct_cdi;
    const pctCdiCls = pctCdi != null && pctCdi >= 100 ? 'gold' : '';
    const pctCdiStr = pctCdi != null ? pctCdi.toFixed(0) + '%' : '—';

    document.getElementById('cards-snapshot').innerHTML =
      card('Exp. 12M (Atual)', fmtPct(mRet.hold_12m / 100), cls(mRet.hold_12m), 'retorno esperado', 'Projeção (Forward Looking): Retorno matemático esperado da carteira atual (sem rebalanceamento) em 12 meses') +
      card('% do CDI', pctCdiStr, pctCdiCls, `CDI ${fmtPct(cdi.total_return)} no período`, 'Quanto o seu TWR representa sobre o rendimento do CDI no período (objetivo: >100%)') +
      card('Volatilidade', fmtPct(twr.volatility), '', `sharpe ${fmtNum(twr.sharpe)}`, 'Risco: quanto a carteira oscila. Sharpe indica se esse risco compensou sobre o CDI livre de risco.') +
      card('Alpha vs Ibov', fmtPct(alpha.total), cls(alpha.total), 'TWR − bench', 'Alpha: Quanto sua carteira rendeu de prêmio (a mais ou a menos) contra o Ibovespa');

    // ── Line chart: Portfolio vs Ibovespa vs CDI, base 100 ──
    if (dailyRows.length > 0) {
      const labels = [dailyRows[0].date];
      const pS = [100], bS = [100], cS = [100];
      let pB = 100, bB = 100, cB = 100;

      for (let i = 1; i < dailyRows.length; i++) {
        const r = dailyRows[i];
        labels.push(r.date);
        const pr = parseFloat(r.portfolio_return);
        const br = parseFloat(r.benchmark_return);
        const cr = parseFloat(r.cdi_return);
        pB *= isNaN(pr)?1:(1+pr); bB *= isNaN(br)?1:(1+br); cB *= isNaN(cr)?1:(1+cr);
        pS.push(pB); bS.push(bB); cS.push(cB);
      }

      new Chart(document.getElementById('perf-chart').getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label:'Portfólio', data:pS, borderColor:'#1971c2', backgroundColor:'rgba(25,113,194,0.07)',
              fill:true, borderWidth:2, pointRadius:0, pointHitRadius:6, tension:0.1 },
            { label:'Ibovespa', data:bS, borderColor:'#8b93a5', borderWidth:1.5,
              borderDash:[4,3], pointRadius:0, pointHitRadius:6, tension:0.1, fill:false },
            { label:'CDI', data:cS, borderColor:'#e67700', borderWidth:1.5,
              borderDash:[2,2], pointRadius:0, pointHitRadius:6, tension:0, fill:false },
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          layout: { padding: { right: 60 } },
          interaction:{mode:'index',intersect:false},
          scales: {
            x:{ ticks:{color:'#8b93a5',font:{size:10},maxTicksLimit:10,maxRotation:0}, grid:{color:'rgba(0,0,0,0.06)'} },
            y:{ ticks:{color:'#8b93a5',font:{size:10,family:"'SF Mono',monospace"},callback:v=>v.toFixed(0)}, grid:{color:'rgba(0,0,0,0.06)'} }
          },
          plugins: {
            legend:{ labels:{color:'#4b5468',font:{size:12},usePointStyle:true,pointStyleWidth:8} },
            tooltip:{
              backgroundColor:'#ffffff',borderColor:'#dde1ea',borderWidth:1,
              titleColor:'#1c1f2e',bodyColor:'#4b5468',
              bodyFont:{family:"'SF Mono',monospace",size:12},
              callbacks:{ label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2)}` }
            }
          }
        },
        plugins: [{
          id: 'endValuePlugin',
          afterDatasetsDraw(chart) {
            const ctx = chart.ctx;
            chart.data.datasets.forEach((dataset, i) => {
              const meta = chart.getDatasetMeta(i);
              if (!meta.hidden && meta.data.length > 0) {
                const lastPoint = meta.data[meta.data.length - 1];
                const finalVal = dataset.data[dataset.data.length - 1];
                const pctRet = finalVal - 100;
                const sign = pctRet > 0 ? '+' : '';
                const text = ` ${sign}${pctRet.toFixed(2)}%`;
                
                ctx.save();
                ctx.font = '600 11px Inter, sans-serif';
                ctx.fillStyle = dataset.borderColor;
                ctx.textBaseline = 'middle';
                ctx.fillText(text, lastPoint.x + 4, lastPoint.y);
                ctx.restore();
              }
            });
          }
        }]
      });
    }

    // ── Performance windows table ──
    const winOrder = ['YTD','3M','6M','12M','24M'];
    const winLabels = {YTD:'YTD',  '3M':'3 meses','6M':'6 meses','12M':'12 meses','24M':'24 meses'};
    const available = winOrder.filter(w => perf[w]);

    if (available.length) {
      // ── Grouped bar chart (Table has been removed by design) ──
      const barLabels = available.map(w=>winLabels[w]||w);
      const portData = available.map(w=> +(perf[w].portfolio*100).toFixed(2));
      const benchData = available.map(w=> +(perf[w].benchmark*100).toFixed(2));
      const cdiData = available.map(w=> +(perf[w].cdi*100).toFixed(2));

      new Chart(document.getElementById('bar-chart').getContext('2d'), {
        type: 'bar',
        data: {
          labels: barLabels,
          datasets: [
            { label:'Portfólio', data:portData, backgroundColor:'#1971c2', borderRadius:4 },
            { label:'Ibovespa', data:benchData, backgroundColor:'#8b93a5', borderRadius:4 },
            { label:'CDI', data:cdiData, backgroundColor:'#e67700', borderRadius:4 },
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          layout: { padding: { right: 35, left: 35 } },
          indexAxis:'y',
          scales: {
            x:{ ticks:{color:'#8b93a5',font:{size:10,family:"'SF Mono',monospace"},callback:v=>v+'%'},
                grid:{color:'rgba(0,0,0,0.06)'} },
            y:{ ticks:{color:'#4b5468',font:{size:11}}, grid:{display:false} }
          },
          plugins: {
            legend:{ labels:{color:'#4b5468',font:{size:11},usePointStyle:true,pointStyleWidth:8} },
            tooltip:{
              backgroundColor:'#ffffff',borderColor:'#dde1ea',borderWidth:1,
              titleColor:'#1c1f2e',bodyColor:'#4b5468',
              bodyFont:{family:"'SF Mono',monospace",size:12},
              callbacks:{ label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x.toFixed(2)}%` }
            }
          }
        },
        plugins: [{
          id: 'barValuesPlugin',
          afterDatasetsDraw(chart) {
            const ctx = chart.ctx;
            chart.data.datasets.forEach((dataset, i) => {
              const meta = chart.getDatasetMeta(i);
              if (!meta.hidden) {
                meta.data.forEach((bar, index) => {
                  const val = dataset.data[index];
                  const text = ` ${val > 0 ? '+' : ''}${val.toFixed(2)}%`;
                  
                  ctx.save();
                  ctx.font = '600 11px Inter, sans-serif';
                  ctx.fillStyle = dataset.backgroundColor;
                  ctx.textBaseline = 'middle';
                  ctx.textAlign = val >= 0 ? 'left' : 'right';
                  const xOffset = val >= 0 ? bar.x + 6 : bar.x - 6;
                  ctx.fillText(text, xOffset, bar.y);
                  ctx.restore();
                });
              }
            });
          }
        }]
      });
    }

    // ── Monthly TWR returns table ──
    const mr = real.monthly_returns || {};
    const meses = mr.meses || [];
    if (meses.length > 0) {
      const MO_LABEL = {
        '01':'Jan','02':'Fev','03':'Mar','04':'Abr','05':'Mai','06':'Jun',
        '07':'Jul','08':'Ago','09':'Set','10':'Out','11':'Nov','12':'Dez'
      };
      function mesLabel(m) {
        const [y, mo] = m.split('-');
        return `${MO_LABEL[mo] || mo}/${y.slice(2)}`;
      }

      let html = '<table class="perf-table"><thead><tr>';
      html += '<th style="text-align:left">Mês</th><th>Retorno</th><th>CDI</th><th>Acumulado</th><th>Pregões</th>';
      html += '</tr></thead><tbody>';

      const mesesInvertidos = [...meses].reverse();
      for (const m of mesesInvertidos) {
        const ret = m.retorno_mes;
        const cdi = m.retorno_cdi;
        const acum = m.retorno_acumulado;
        const isGap = m.pregoes === 0;
        const retCls = isGap ? 'gap' : (ret >= 0 ? 'pos' : 'neg');
        const acumCls = acum >= 0 ? 'pos' : 'neg';

        html += `<tr>
          <td>${mesLabel(m.mes)}</td>
          <td class="${retCls}">${isGap ? '—' : fmtPct(ret)}</td>
          <td>${cdi != null && !isGap ? fmtPct(cdi) : '—'}</td>
          <td class="${acumCls}">${fmtPct(acum)}</td>
          <td style="color:var(--text-muted)">${m.pregoes}</td>
        </tr>`;
      }

      // Total row
      const twrTotal = mr.twr_total;
      const cdiTotal = mr.cdi_total;
      const totalCls = twrTotal >= 0 ? 'pos' : 'neg';
      html += `<tr class="total-row">
        <td><strong>Total</strong></td>
        <td class="${totalCls}"><strong>${fmtPct(twrTotal)}</strong></td>
        <td>${cdiTotal != null ? fmtPct(cdiTotal) : '—'}</td>
        <td class="${totalCls}"><strong>${fmtPct(twrTotal)}</strong></td>
        <td style="color:var(--text-muted)">${meses.reduce((s,m)=>s+m.pregoes,0)}</td>
      </tr>`;

      html += '</tbody></table>';
      document.getElementById('monthly-returns-container').innerHTML = html;
    }

    // ── Current Portfolio Composition ──
    const totalMkt = positions?.total_current_market || 0;
    if (positions && positions.positions && positions.positions.length > 0 && totalMkt > 0) {
      const holdings = positions.positions
        .map(p => {
          const symbol = (p.resolved_symbol || p.symbol || '').replace('.SA', '');
          const mktVal = p.net_qty * p.current_price;
          const weight = mktVal / totalMkt;
          const avgCost = p.net_qty > 0 ? p.net_invested / p.net_qty : 0;
          const pl = mktVal - p.net_invested;
          const plPct = p.net_invested > 0 ? pl / p.net_invested : 0;
          return { symbol, qty: p.net_qty, avgCost, currentPrice: p.current_price, targetPrice: p.target_price, mktVal, weight, pl, plPct };
        })
        .filter(h => h.weight > 0)
        .sort((a, b) => b.weight - a.weight);

      let html = `<table class="perf-table" style="text-align: right;">
        <thead><tr>
          <th style="text-align: left;">Ativo</th>
          <th>Peso</th>
          <th>Qtd</th>
          <th>Custo Médio</th>
          <th>Cotação</th>
          <th>Valor Mercado</th>
          <th>P&L</th>
          <th>P&L %</th>
        </tr></thead><tbody>`;

      let totalInvested = 0, totalMktVal = 0;
      for (const h of holdings) {
        const plCls = h.pl >= 0 ? 'pos' : 'neg';
        totalInvested += h.avgCost * h.qty;
        totalMktVal += h.mktVal;
        html += `<tr>
          <td style="font-family: var(--font-sans); font-weight: 600; color: var(--accent-blue); text-align: left;">${h.symbol}</td>
          <td>${(h.weight * 100).toFixed(1)}%</td>
          <td>${h.qty}</td>
          <td>${fmtBRL(h.avgCost)}</td>
          <td>${fmtBRL(h.currentPrice)}</td>
          <td>${fmtBRL(h.mktVal)}</td>
          <td class="${plCls}">${fmtBRL(h.pl)}</td>
          <td class="${plCls}">${fmtPct(h.plPct)}</td>
        </tr>`;
      }

      const totalPL = totalMktVal - totalInvested;
      const totalPLpct = totalInvested > 0 ? totalPL / totalInvested : 0;
      const totalPLcls = totalPL >= 0 ? 'pos' : 'neg';
      html += `<tr style="border-top: 2px solid var(--border); font-weight: 700; font-family: var(--font-sans);">
        <td style="text-align: left;">Total</td>
        <td>100%</td>
        <td></td>
        <td></td>
        <td></td>
        <td>${fmtBRL(totalMktVal)}</td>
        <td class="${totalPLcls}">${fmtBRL(totalPL)}</td>
        <td class="${totalPLcls}">${fmtPct(totalPLpct)}</td>
      </tr>`;

      html += `</tbody></table>`;
      document.getElementById('composition-table-container').innerHTML = html;
    } else {
      document.getElementById('composition-table-container').innerHTML = '<span class="loading">Nenhuma posição atual encontrada.</span>';
    }

  } catch (err) {
    document.getElementById('cards-snapshot').innerHTML =
      `<div class="card"><span class="loading" style="color:var(--accent-red)">Erro: ${err.message}</span></div>`;
  }
}

render();
</script>
</body>
</html>
