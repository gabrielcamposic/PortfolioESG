<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>08 — Histórico de Portfólios</title>
<link rel="stylesheet" href="../css/base.css">
<script src="../js/header.js" data-page="history"></script>
<style>
  .section-title {
    font-size: 9px;
    font-weight: var(--font-weight-emphasis);
    color: var(--color-label);
    margin-bottom: 24px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    border-left: 4px solid var(--brand-red);
    padding: 2px 0 2px 12px;
  }
  .section-title .toggle {
    font-size: 12px; color: var(--text-muted); margin-left: auto; transition: transform 0.2s;
  }
  .section-title .toggle.collapsed { transform: rotate(-90deg); }

  .premium-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeInUp 0.6s ease forwards;
  }

  .summary-bar {
    padding: 12px 28px; border-bottom: 1px solid var(--border-strong);
    background: var(--bg-card-alt); font-size: 9px;
    color: var(--color-label); font-family: var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.1em;
    display: flex; justify-content: space-between; align-items: center;
    font-weight: var(--font-weight-emphasis);
  }

  /* ── Table Styling ── */
  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  
  thead tr.group-headers th {
    padding: 12px 20px; font-size: 8px; text-transform: uppercase;
    font-weight: var(--font-weight-emphasis); letter-spacing: 0.12em; color: var(--color-label);
  }
  thead tr.main-headers th {
    padding: 12px 20px; font-size: 9px; font-weight: var(--font-weight-emphasis);
    text-transform: uppercase; color: var(--color-label);
    border-bottom: 1px solid var(--border-strong);
    background: var(--bg-card); position: sticky; top: 0;
    letter-spacing: 0.1em;
  }

  /* Group Dividers & Headers */
  .group-fwd { background: rgba(27, 53, 96, 0.08) !important; color: var(--brand-blue) !important; border-radius: 8px 8px 0 0; }
  .group-bwd { background: hsla(210, 15%, 45%, 0.1) !important; color: var(--text-muted) !important; border-radius: 8px 8px 0 0; }


  th.right, td.right { text-align: right; }
  td {
    padding: 14px 20px; font-family: var(--font-sans); font-size: 12px;
    border-bottom: 1px solid var(--border); color: var(--text-primary);
    transition: background 0.2s;
  }
  
  /* Vertical Dividers */
  .sep-fwd { border-left: 2px solid rgba(27, 53, 96, 0.1) !important; }
  .sep-bwd { border-left: 2px solid hsla(210, 15%, 45%, 0.1) !important; }


  tr.latest td { background: rgba(27, 53, 96, 0.05); }
  tr:hover td { background: rgba(27, 53, 96, 0.08); }


  /* Cells */
  .cell-date { color: var(--text-primary); font-family: var(--font-sans); font-size: 12px; white-space: nowrap; font-weight: var(--font-weight-emphasis); }
  .cell-assets { color: var(--color-label); font-weight: var(--font-weight-emphasis); font-size: 11px; }
  .cell-proj { color: var(--brand-blue); font-weight: var(--font-weight-emphasis); font-size: 13px; }
  .cell-score {
    display: inline-block; padding: 4px 10px; border-radius: 12px;
    background: rgba(27, 53, 96, 0.08); color: var(--brand-blue); font-weight: var(--font-weight-emphasis); font-size: 11px;
  }


  /* ── Expandable Detail ── */
  .expand-btn {
    background: var(--bg-card); border: 1px solid var(--border-strong); color: var(--accent-blue);
    font-size: 10px; font-weight: var(--font-weight-emphasis); text-transform: uppercase; cursor: pointer; padding: 6px 12px;
    border-radius: 20px; font-family: var(--font-sans);
    display: flex; align-items: center; gap: 4px;
    transition: all 0.2s; box-shadow: var(--shadow-sm);
  }
  .expand-btn:hover { background: var(--bg-card-alt); transform: scale(1.05); }
  .expand-btn .icon { transition: transform 0.2s; display: inline-block; font-size: 12px; }
  .expand-btn.active .icon { transform: rotate(90deg); }

  .detail-row { display: none; }
  .detail-row.visible { display: table-row; }
  .detail-content { padding: 24px; background: var(--bg-card-alt); border-radius: 0 0 12px 12px; margin: 4px; }

  
  .detail-grid { display: grid; grid-template-columns: 1fr 280px; gap: 32px; }
  .chips-container { display: flex; flex-wrap: wrap; gap: 8px; }
  .stock-chip {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 8px;
    font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono);
    box-shadow: var(--shadow-sm);
  }
  .stock-ticker { font-weight: var(--font-weight-emphasis); color: var(--brand-blue); }
  .stock-weight { color: var(--text-muted); font-weight: 600; }

  .run-info {
    font-size: 11px; color: var(--text-muted);
    display: flex; flex-direction: column; gap: 12px;
    padding-left: 24px; border-left: 1px solid var(--border-strong);
  }
  .info-item { display: flex; justify-content: space-between; align-items: center; }
  .info-label { font-family: var(--font-sans); font-weight: var(--font-weight-emphasis); text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-label); font-size: 9px; }
  .info-value { font-weight: var(--font-weight-emphasis); color: var(--text-primary); font-size: 13px; }

  .positive { color: var(--color-positive); }
  .negative { color: var(--color-negative); }


  @media (max-width: 900px) {
    .detail-grid { grid-template-columns: 1fr; }
    .run-info { padding: 20px 0 0; border-left: none; border-top: 1px solid var(--border); }
  }
</style>

</head>
<body>

<div class="section-title" onclick="toggleSection()">
  Histórico e Qualidade do Modelo
  <span class="toggle" id="toggle-icon">▼</span>
</div>

<div class="premium-card" id="history-section">
  <div id="history-loading" style="padding: 40px; text-align: center; color: var(--text-muted);">
    <span class="loading">Sincronizando métricas do modelo...</span>
  </div>
  <div id="history-container" style="display: none;">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="table-wrapper">
      <table id="history-table">
        <thead>
          <tr class="group-headers">
            <th colspan="2">Base</th>
            <th colspan="4" class="group-fwd">Qualidade do Modelo (Forward)</th>
            <th colspan="2" class="group-bwd">Fundamentos (12m Real)</th>
            <th></th>
          </tr>
          <tr class="main-headers">
            <th>Data</th>
            <th class="right">Ativos</th>
            <th class="right sep-fwd">Ret. Proj. 12m</th>
            <th class="right">Sharpe Fwd</th>
            <th class="right">Score</th>
            <th class="right">Momentum</th>
            <th class="right sep-bwd">Retorno</th>
            <th class="right">Volatilidade</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const DATA_URL = '../data/portfolio_history_enriched.json';

function toggleSection() {
  const section = document.getElementById('history-section');
  const icon = document.getElementById('toggle-icon');
  const isHidden = section.style.display === 'none';
  section.style.display = isHidden ? 'block' : 'none';
  icon.classList.toggle('collapsed', !isHidden);
}

function fmtDate(rid) {
  if (!rid) return '—';
  const m = String(rid).match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/);
  if (!m) return rid;
  return `${m[3]}/${m[2]}/${m[1]} ${m[4]}:${m[5]}`;
}

function fmtVal(v, d=2, suffix='', sign=false) {
  if (v == null || isNaN(v)) return '—';
  let s = v.toFixed(d);
  if (sign && v > 0) s = '+' + s;
  return s + suffix;
}

window.toggleDetail = function(btn, id) {
  const row = document.getElementById(`detail-${id}`);
  const isVisible = row.classList.toggle('visible');
  btn.classList.toggle('active', isVisible);
  btn.innerHTML = `<span class="icon">${isVisible ? '▾' : '▸'}</span> ${isVisible ? 'fechar' : 'ver'}`;
};

async function init() {
  try {
    const response = await fetch(DATA_URL);
    if (!response.ok) throw new Error('Falha ao carregar dados enriquecidos');
    const data = await response.json();

    const container = document.getElementById('history-container');
    const loading = document.getElementById('history-loading');
    const body = document.getElementById('history-body');
    const summaryBar = document.getElementById('summary-bar');

    loading.style.display = 'none';
    container.style.display = 'block';

    if (!data.length) {
      body.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px;">Nenhum registro encontrado.</td></tr>';
      return;
    }

    summaryBar.innerHTML = `
      <span>${data.length} simulações registradas</span>
      <span>Última atualização: ${fmtDate(data[0].run_id)}</span>
    `;

    let html = '';
    data.forEach((r, i) => {
      const isLatest = i === 0;
      
      // Momentum grouping logic: absolute value
      const momClass = r.momentum != null ? (r.momentum > 0.4 ? 'momentum-up' : r.momentum < 0.2 ? 'momentum-down' : '') : '';

      html += `
        <tr class="${isLatest ? 'latest' : ''}">
          <td class="cell-date">${fmtDate(r.run_id)}</td>
          <td class="right cell-assets">${r.n_assets || 0}</td>
          
          <td class="right cell-proj sep-fwd col-fwd ${r.ret_proj_12m >= 0 ? 'positive' : 'negative'}">
            ${fmtVal(r.ret_proj_12m, 2, '%', true)}
          </td>
          <td class="right col-fwd">${fmtVal(r.sharpe_forward, 3)}</td>
          <td class="right col-fwd"><span class="cell-score">${fmtVal(r.score, 3)}</span></td>
          <td class="right cell-mom col-fwd ${momClass}">${fmtVal(r.momentum, 2)}</td>
          
          <td class="right sep-bwd col-bwd">${fmtVal(r.ret_hist_12m, 1, '%')}</td>
          <td class="right col-bwd">${fmtVal(r.vol_12m, 1, '%')}</td>
          
          <td class="right">
            <button class="expand-btn" onclick="toggleDetail(this, '${r.run_id}')">
              <span class="icon">▸</span> ver
            </button>
          </td>
        </tr>
        <tr class="detail-row" id="detail-${r.run_id}">
          <td colspan="9">
            <div class="detail-content">
              <div class="detail-grid">
                <div class="chips-container">
                  ${(r.stocks || []).map((s, idx) => `
                    <div class="stock-chip">
                      <span class="stock-ticker">${s}</span>
                      <span class="stock-weight">${r.weights && r.weights[idx] ? (r.weights[idx]*100).toFixed(1)+'%' : ''}</span>
                    </div>
                  `).join('')}
                </div>
                <div class="run-info">
                  <div class="info-item">
                    <span class="info-label">Run ID</span>
                    <span class="info-value">${r.run_id}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">Decisão</span>
                    <span class="info-value" style="color: ${r.decision==='REBALANCE'?'var(--color-negative)':'var(--color-positive)'}">

                      ${r.decision || '—'}
                    </span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">Custo Transição</span>
                    <span class="info-value">${fmtVal(r.transition_cost_pct, 4, '%')}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">Holdings Return</span>
                    <span class="info-value">${fmtVal(r.holdings_return_pct, 2, '%')}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">Excesso vs Ideal</span>
                    <span class="info-value ${r.excess_return_pct < 0 ? 'negative' : 'positive'}">
                      ${fmtVal(r.excess_return_pct, 2, '%', true)}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </td>
        </tr>
      `;
    });

    body.innerHTML = html;

  } catch (err) {
    console.error('History Init Error:', err);
    document.getElementById('history-loading').innerHTML = 
      `<div style="color: var(--accent-red)">Erro ao inicializar histórico: ${err.message}</div>`;
  }
}

init();
</script>
</body>
</html>
