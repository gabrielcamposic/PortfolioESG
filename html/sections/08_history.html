<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>08 — Histórico de Portfólios</title>
<link rel="stylesheet" href="../css/base.css">
<script src="../js/header.js" data-page="history"></script>
<style>
  :root {
    --fwd-color: #1c7ed6;
    --bwd-color: #495057;
    --score-bg: linear-gradient(135deg, #e7f5ff 0%, #d0ebff 100%);
  }

  .section-title {
    font-size: 16px; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    user-select: none;
  }
  .section-title::before {
    content: ''; display: inline-block; width: 3px; height: 18px;
    background: var(--accent-blue); border-radius: 2px;
  }
  .section-title .toggle {
    font-size: 12px; color: var(--text-muted); margin-left: auto;
    transition: transform 0.2s;
  }
  .section-title .toggle.collapsed { transform: rotate(-90deg); }

  .card { padding: 0; overflow: hidden; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); }

  .summary-bar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg-card-alt); font-size: 11px;
    color: var(--text-muted); font-family: var(--font-mono);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ── Table Styling ── */
  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
  
  thead tr.group-headers th {
    padding: 8px 14px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; border-bottom: none; color: var(--text-muted);
  }
  thead tr.main-headers th {
    padding: 12px 14px; font-size: 11px; font-weight: 700;
    border-bottom: 2px solid var(--border); color: var(--text-secondary);
    background: var(--bg-card); position: sticky; top: 0;
  }

  /* Section-based Column Styling */
  .col-base { border-right: 1px solid var(--border-light); }
  .col-fwd { background: rgba(28, 126, 214, 0.02); }
  .col-bwd { background: rgba(73, 80, 87, 0.02); border-left: 1px solid var(--border-light); }

  /* Group Dividers & Headers */
  .group-fwd { 
    background: rgba(28, 126, 214, 0.08) !important; 
    border-bottom: 2px solid var(--fwd-color) !important; 
    color: var(--fwd-color) !important;
    border-radius: 8px 8px 0 0;
  }
  .group-bwd { 
    background: rgba(73, 80, 87, 0.08) !important; 
    border-bottom: 2px solid var(--bwd-color) !important; 
    color: var(--bwd-color) !important;
    border-radius: 8px 8px 0 0;
  }

  th.right, td.right { text-align: right; }
  td {
    padding: 14px 14px; font-family: var(--font-mono); font-size: 12px;
    border-bottom: 1px solid var(--border-light); transition: background 0.2s;
  }
  
  /* Vertical Dividers */
  .sep-fwd { border-left: 2px solid rgba(28, 126, 214, 0.15) !important; }
  .sep-bwd { border-left: 2px solid rgba(73, 80, 87, 0.15) !important; }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,0,0,0.02); }
  tr.latest td { background: rgba(25,113,194,0.04); }

  /* Cells */
  .cell-date { color: var(--text-secondary); font-family: var(--font-sans); font-size: 12px; white-space: nowrap; font-weight: 500; }
  .cell-assets { color: var(--text-muted); font-weight: 600; }
  .cell-proj { color: var(--fwd-color); font-weight: 700; font-size: 13px; }
  .cell-score {
    display: inline-block; padding: 4px 10px; border-radius: 12px;
    background: var(--score-bg); color: #004a99; font-weight: 700; font-size: 11px;
    box-shadow: 0 1px 3px rgba(0,74,153,0.1);
  }
  .cell-mom { font-weight: 600; }

  /* ── Expandable Detail ── */
  .expand-btn {
    background: none; border: none; color: var(--accent-blue);
    font-size: 11px; cursor: pointer; padding: 6px 12px;
    border-radius: 4px; font-family: var(--font-sans);
    display: flex; align-items: center; gap: 4px;
    transition: all 0.2s;
  }
  .expand-btn:hover { background: rgba(25,113,194,0.1); }
  .expand-btn .icon { transition: transform 0.2s; display: inline-block; }
  .expand-btn.active .icon { transform: rotate(90deg); }

  .detail-row { display: none; background: #fafafa; }
  .detail-row.visible { display: table-row; }
  .detail-content { padding: 20px; }
  
  .detail-grid {
    display: grid; grid-template-columns: 1fr 250px; gap: 24px;
  }
  .chips-container { display: flex; flex-wrap: wrap; gap: 6px; }
  .stock-chip {
    display: flex; align-items: center; gap: 6px; padding: 4px 10px;
    background: #fff; border: 1px solid #e0e0e0; border-radius: 6px;
    font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono);
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .stock-ticker { font-weight: 600; color: var(--accent-blue); }
  .stock-weight { color: var(--text-muted); font-size: 10px; }

  .run-info {
    font-size: 11px; color: var(--text-muted);
    display: flex; flex-direction: column; gap: 8px;
    padding-left: 20px; border-left: 1px solid var(--border);
  }
  .info-item { display: flex; justify-content: space-between; }
  .info-label { font-family: var(--font-sans); }
  .info-value { font-weight: 600; }

  .positive { color: #2b8a3e; }
  .negative { color: #c92a2a; }
  .momentum-up { color: #2b8a3e; }
  .momentum-down { color: #c92a2a; }

  @media (max-width: 900px) {
    .detail-grid { grid-template-columns: 1fr; }
    .run-info { padding: 15px 0 0; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="section-title" onclick="toggleSection()">
  Histórico e Qualidade do Modelo
  <span class="toggle" id="toggle-icon">▼</span>
</div>

<div class="card" id="history-section">
  <div id="history-loading" style="padding: 40px; text-align: center; color: var(--text-muted);">
    <span class="loading">Sincronizando métricas do modelo...</span>
  </div>
  <div id="history-container" style="display: none;">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="table-wrapper">
      <table id="history-table">
        <thead>
          <tr class="group-headers">
            <th colspan="2">Base</th>
            <th colspan="4" class="group-fwd">Qualidade do Modelo (Forward)</th>
            <th colspan="2" class="group-bwd">Fundamentos (12m Real)</th>
            <th></th>
          </tr>
          <tr class="main-headers">
            <th>Data</th>
            <th class="right">Ativos</th>
            <th class="right sep-fwd">Ret. Proj. 12m</th>
            <th class="right">Sharpe Fwd</th>
            <th class="right">Score</th>
            <th class="right">Momentum</th>
            <th class="right sep-bwd">Retorno</th>
            <th class="right">Volatilidade</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const DATA_URL = '../data/portfolio_history_enriched.json';

function toggleSection() {
  const section = document.getElementById('history-section');
  const icon = document.getElementById('toggle-icon');
  const isHidden = section.style.display === 'none';
  section.style.display = isHidden ? 'block' : 'none';
  icon.classList.toggle('collapsed', !isHidden);
}

function fmtDate(rid) {
  if (!rid) return '—';
  const m = String(rid).match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/);
  if (!m) return rid;
  return `${m[3]}/${m[2]}/${m[1]} ${m[4]}:${m[5]}`;
}

function fmtVal(v, d=2, suffix='', sign=false) {
  if (v == null || isNaN(v)) return '—';
  let s = v.toFixed(d);
  if (sign && v > 0) s = '+' + s;
  return s + suffix;
}

window.toggleDetail = function(btn, id) {
  const row = document.getElementById(`detail-${id}`);
  const isVisible = row.classList.toggle('visible');
  btn.classList.toggle('active', isVisible);
  btn.innerHTML = `<span class="icon">${isVisible ? '▾' : '▸'}</span> ${isVisible ? 'fechar' : 'ver'}`;
};

async function init() {
  try {
    const response = await fetch(DATA_URL);
    if (!response.ok) throw new Error('Falha ao carregar dados enriquecidos');
    const data = await response.json();

    const container = document.getElementById('history-container');
    const loading = document.getElementById('history-loading');
    const body = document.getElementById('history-body');
    const summaryBar = document.getElementById('summary-bar');

    loading.style.display = 'none';
    container.style.display = 'block';

    if (!data.length) {
      body.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px;">Nenhum registro encontrado.</td></tr>';
      return;
    }

    summaryBar.innerHTML = `
      <span>${data.length} simulações registradas</span>
      <span>Última atualização: ${fmtDate(data[0].run_id)}</span>
    `;

    let html = '';
    data.forEach((r, i) => {
      const isLatest = i === 0;
      
      // Momentum grouping logic: absolute value
      const momClass = r.momentum != null ? (r.momentum > 0.4 ? 'momentum-up' : r.momentum < 0.2 ? 'momentum-down' : '') : '';

      html += `
        <tr class="${isLatest ? 'latest' : ''}">
          <td class="cell-date">${fmtDate(r.run_id)}</td>
          <td class="right cell-assets">${r.n_assets || 0}</td>
          
          <td class="right cell-proj sep-fwd col-fwd ${r.ret_proj_12m >= 0 ? 'positive' : 'negative'}">
            ${fmtVal(r.ret_proj_12m, 2, '%', true)}
          </td>
          <td class="right col-fwd">${fmtVal(r.sharpe_forward, 3)}</td>
          <td class="right col-fwd"><span class="cell-score">${fmtVal(r.score, 3)}</span></td>
          <td class="right cell-mom col-fwd ${momClass}">${fmtVal(r.momentum, 2)}</td>
          
          <td class="right sep-bwd col-bwd">${fmtVal(r.ret_hist_12m, 1, '%')}</td>
          <td class="right col-bwd">${fmtVal(r.vol_12m, 1, '%')}</td>
          
          <td class="right">
            <button class="expand-btn" onclick="toggleDetail(this, '${r.run_id}')">
              <span class="icon">▸</span> ver
            </button>
          </td>
        </tr>
        <tr class="detail-row" id="detail-${r.run_id}">
          <td colspan="9">
            <div class="detail-content">
              <div class="detail-grid">
                <div class="chips-container">
                  ${(r.stocks || []).map((s, idx) => `
                    <div class="stock-chip">
                      <span class="stock-ticker">${s}</span>
                      <span class="stock-weight">${r.weights && r.weights[idx] ? (r.weights[idx]*100).toFixed(1)+'%' : ''}</span>
                    </div>
                  `).join('')}
                </div>
                <div class="run-info">
                  <div class="info-item">
                    <span class="info-label">Run ID</span>
                    <span class="info-value">${r.run_id}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">Decisão</span>
                    <span class="info-value" style="color: ${r.decision==='REBALANCE'?'var(--accent-blue)':'var(--text-muted)'}">
                      ${r.decision || '—'}
                    </span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">Custo Transição</span>
                    <span class="info-value">${fmtVal(r.transition_cost_pct, 4, '%')}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">Holdings Return</span>
                    <span class="info-value">${fmtVal(r.holdings_return_pct, 2, '%')}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">Excesso vs Ideal</span>
                    <span class="info-value ${r.excess_return_pct < 0 ? 'negative' : 'positive'}">
                      ${fmtVal(r.excess_return_pct, 2, '%', true)}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </td>
        </tr>
      `;
    });

    body.innerHTML = html;

  } catch (err) {
    console.error('History Init Error:', err);
    document.getElementById('history-loading').innerHTML = 
      `<div style="color: var(--accent-red)">Erro ao inicializar histórico: ${err.message}</div>`;
  }
}

init();
</script>
</body>
</html>
