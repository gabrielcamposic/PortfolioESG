<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 — Risco</title>
<link rel="stylesheet" href="../css/base.css">
<script src="../js/header.js" data-page="risk"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  /* ── Dashboard Layout Grids ── */
  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeInUp 0.6s ease forwards;
  }

  /* ── Table ── */
  .table-card {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }
  .table-card .table-title {
    font-size: 9px;
    font-weight: var(--font-weight-emphasis);
    color: var(--color-label);
    margin-bottom: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
    border-left: 4px solid var(--brand-red);
    padding: 2px 0 2px 12px;
  }

  
  .risk-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-sans);
    font-size: 13px;
  }
  .risk-table th {
    text-align: right;
    font-weight: var(--font-weight-emphasis);
    color: var(--color-label);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-strong);
  }
  .risk-table th:first-child { text-align: left; }
  .risk-table td {
    text-align: right;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-weight: 500;
  }
  .risk-table td:first-child {
    text-align: left;
    color: var(--brand-blue);
    font-weight: var(--font-weight-emphasis);
    font-size: 13px;
    font-family: var(--font-sans);
  }
  .risk-table tr.row-all td {
    background: var(--text-primary);
    color: #fff;
    font-weight: var(--font-weight-emphasis);
  }

  /* ── Bar chart ── */
  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }
  .chart-card .chart-title {
    font-size: 9px;
    font-weight: var(--font-weight-emphasis);
    color: var(--color-label);
    margin-bottom: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
    border-left: 4px solid var(--brand-red);
    padding: 2px 0 2px 12px;
  }
  .bar-chart-wrapper { position: relative; height: 280px; }

  /* ── Duo Charts Layout ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  @media (max-width: 800px) {
    .charts-row { grid-template-columns: 1fr; }
    .bar-chart-wrapper { height: 240px; }
  }
</style>

</head>
<body>

<div class="period-header" id="period-header"></div>

<!-- Raio-X de Risco Histórico -->
<div class="table-card" style="background: transparent; border: none; padding: 0;">
  <div class="table-title" style="padding-left: 5px;">Raio-X de Estresse Histórico (Carteira Real)</div>
  <div class="cards-row" id="cards-stress">
    <div class="card"><span class="loading">Carregando...</span></div>
  </div>
</div>

<!-- Comparativo Atual vs Modelo -->
<div class="table-card">
  <div class="table-title">Comparativo de Risco (Carteira Atual vs. Modelo Proposto)</div>
  <div id="compare-table-container"><span class="loading">Carregando...</span></div>
</div>

<!-- Dual Concentration bar charts (Setores) -->
<div class="charts-row">
  <div class="chart-card">
    <div class="chart-title">Alocação por Setor (Carteira Atual)</div>
    <div class="bar-chart-wrapper">
      <canvas id="sector-concentration-chart"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Alocação por Setor (Modelo Proposto)</div>
    <div class="bar-chart-wrapper">
      <canvas id="model-sector-concentration-chart"></canvas>
    </div>
  </div>
</div>

<!-- Dual Concentration bar charts (Ativos) -->
<div class="charts-row">
  <div class="chart-card">
    <div class="chart-title">Alocação por Ativo (Carteira Atual)</div>
    <div class="bar-chart-wrapper">
      <canvas id="concentration-chart"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Alocação por Ativo (Modelo Proposto)</div>
    <div class="bar-chart-wrapper">
      <canvas id="model-concentration-chart"></canvas>
    </div>
  </div>
</div>

<script type="module">
import { DC, assetColor, plColor } from '../js/data-colors.js';

const DATA_BASE = '../data';

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v * 100).toFixed(2) + '%';
}
function fmtNum(v, d = 2) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(d);
}
function fmtHHI(v) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(4);
}
function fmtLargeNum(v) {
  if (v == null || isNaN(v)) return '—';
  if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'k';
  return v.toFixed(0);
}

function card(label, value, sub) {
  return `<div class="card">
    <div class="label">${label}</div>
    <div class="value">${value}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

async function render() {
  try {
    const [dashboard, positions, recommendation] = await Promise.all([
      fetch(`${DATA_BASE}/dashboard_latest.json`).then(r => r.json()),
      fetch(`${DATA_BASE}/ledger_positions.json`).then(r => r.json()),
      fetch(`${DATA_BASE}/optimized_recommendation.json`).then(r => r.json()).catch(() => ({}))
    ]);

    const real = dashboard.real || {};
    const meta = real.meta || {};
    const rw   = real.risk_windows || {};
    const all  = rw.All || {};

    // ── Period header ──
    const MO = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    if (meta.history_start && meta.history_end) {
      const [sy,sm] = meta.history_start.split('-');
      const [ey,em] = meta.history_end.split('-');
      document.getElementById('period-header').innerHTML =
        `Período de análise · <span class="dates">${MO[+sm-1]}/${sy.slice(2)} – ${MO[+em-1]}/${ey.slice(2)} · ${meta.trading_days||'?'} pregões</span>`;
    }

    // ── Comparison Table (Actual vs Model) ──
    const t_vol_real = dashboard.real.twr?.volatility ? fmtPct(dashboard.real.twr.volatility) : '—';
    const t_vol_mod  = dashboard.model.risk?.volatility_annual ? fmtPct(dashboard.model.risk.volatility_annual / 100) : '—';
    const t_shp_real = dashboard.real.twr?.sharpe ? fmtNum(dashboard.real.twr.sharpe) : '—';
    const t_shp_mod  = dashboard.model.risk?.sharpe ? fmtNum(dashboard.model.risk.sharpe) : '—';
    const t_hhi_real = dashboard.real.structure?.hhi ? fmtHHI(dashboard.real.structure.hhi) : '—';
    const t_hhi_mod  = dashboard.model.risk?.hhi ? fmtHHI(dashboard.model.risk.hhi) : '—';

    const t_pe_real  = dashboard.real.valuation?.portfolio_pe ? fmtNum(dashboard.real.valuation.portfolio_pe) : '—';
    const t_pe_mod   = dashboard.model.valuation?.portfolio_pe ? fmtNum(dashboard.model.valuation.portfolio_pe) : '—';
    const t_liq_real = dashboard.real.risk?.liquidity_avg ? fmtLargeNum(dashboard.real.risk.liquidity_avg) : '—';
    const t_liq_mod  = dashboard.model.risk?.liquidity_avg ? fmtLargeNum(dashboard.model.risk.liquidity_avg) : '—';
    const t_cor_real = dashboard.real.risk?.avg_internal_corr ? fmtNum(dashboard.real.risk.avg_internal_corr, 4) : '—';
    const t_cor_mod  = dashboard.model.risk?.avg_internal_corr ? fmtNum(dashboard.model.risk.avg_internal_corr, 4) : '—';

    let compareHtml = `<table class="risk-table">
      <thead>
        <tr><th>Indicador</th><th>Carteira Atual</th><th>Modelo Proposto</th></tr>
      </thead>
      <tbody>
        <tr><td>Volatilidade Anualizada</td><td>${t_vol_real}</td><td>${t_vol_mod}</td></tr>
        <tr><td>Índice Sharpe</td><td>${t_shp_real}</td><td>${t_shp_mod}</td></tr>
        <tr><td>Concentração (HHI)</td><td>${t_hhi_real}</td><td>${t_hhi_mod}</td></tr>
        <tr><td>Liquidez Média (Vol. R$)</td><td>${t_liq_real}</td><td>${t_liq_mod}</td></tr>
        <tr><td>Correlação Interna Média</td><td>${t_cor_real}</td><td>${t_cor_mod}</td></tr>
        <tr style="border-bottom:none"><td>P/E Médio Ponderado</td><td>${t_pe_real}</td><td>${t_pe_mod}</td></tr>
      </tbody>
    </table>`;
    document.getElementById('compare-table-container').innerHTML = compareHtml;

    // ── Stress Cards ──
    const max_dd = dashboard.real.twr?.max_drawdown ? fmtPct(-dashboard.real.twr.max_drawdown) : '—';
    const beta = dashboard.real.relative?.beta ? fmtNum(dashboard.real.relative.beta) : '—';
    const sortino = dashboard.real.twr?.sortino ? fmtNum(dashboard.real.twr.sortino) : '—';
    const te = all.tracking_error != null ? fmtPct(all.tracking_error) : '—';
    const ir = all.information_ratio != null ? fmtNum(all.information_ratio) : '—';
    const calmar = dashboard.real.twr?.calmar ? fmtNum(dashboard.real.twr.calmar) : '—';

    document.getElementById('cards-stress').innerHTML =
      card('Tracking Error', te, 'desvio do IBOV') +
      card('Info Ratio', ir, 'alfa / tracking error') +
      card('Beta (vs. IBOV)', beta, 'risco direcional') +
      card('Max Drawdown', max_dd, 'pior queda do topo') +
      card('Sortino Ratio', sortino, 'ret. ajustado a queda') +
      card('Índice Calmar', calmar, 'retorno / drawdown');

    // ── Concentration Charts Logic ──
    const totalMarket = positions.total_current_market || 0;
    
    function createChart(ctxId, items, isAsset = false, sortedHoldings = null) {
      if (!document.getElementById(ctxId) || !items || items.length === 0) return;
      
      const colors = isAsset 
        ? items.map(it => assetColor(it.symbol, sortedHoldings))
        : items.map((_, idx) => DC.assets[Math.min(idx, DC.assets.length - 1)]);

      new Chart(document.getElementById(ctxId).getContext('2d'), {
        type: 'bar',
        data: {
          labels: items.map(i => i.symbol),
          datasets: [{
            label: 'Peso (%)',
            data: items.map(i => +(i.weight * 100).toFixed(2)),
            backgroundColor: colors,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          layout: { padding: { right: 40, left: 10 } },
          scales: {
            x: {
              ticks: { color: 'hsl(222, 16%, 55%)', font: { size: 10, family: "var(--font-mono)", weight: 600 }, callback: v => v + '%' },
              grid: { color: 'rgba(0,0,0,0.04)' },
              border: { display: false }
            },
            y: {
              ticks: { color: 'var(--text-secondary)', font: { size: 11, weight: 600 } },
              grid: { display: false },
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.95)', padding: 12, cornerRadius: 10,
              titleColor: '#ffffff', bodyColor: '#e2e8f0',
              titleFont: { weight: 600, size: 13 },
              bodyFont: { family: "var(--font-mono)", size: 12 },
              callbacks: { label: ctx => `${ctx.parsed.x.toFixed(2)}%` }
            }
          }
        }
      });
    }

    // ── Render Charts ──
    if (positions.positions && totalMarket > 0) {
      const realItems = positions.positions
        .map(p => ({
          symbol: (p.resolved_symbol || p.symbol || '').replace('.SA', ''),
          weight: (p.net_qty * p.current_price) / totalMarket,
        }))
        .filter(p => p.weight > 0)
        .sort((a, b) => b.weight - a.weight);
      
      const realHoldings = realItems.map(i => i.symbol);
      createChart('concentration-chart', realItems, true, realHoldings);
    }
    
    // Real Sector Chart
    const realSectorsData = dashboard.real?.structure?.sector_exposure;
    if (realSectorsData && realSectorsData.length > 0) {
      const realSectors = realSectorsData.map(s => ({symbol: s.sector, weight: s.pct}));
      createChart('sector-concentration-chart', realSectors);
    }
 
    // Model Position Chart
    const modelWeights = recommendation?.comparison?.optimal?.weights || recommendation?.comparison?.ideal?.weights;
    if (modelWeights) {
      const modelItems = Object.entries(modelWeights)
        .map(([sym, w]) => ({ symbol: sym.replace('.SA', ''), weight: w }))
        .filter(p => p.weight > 0)
        .sort((a, b) => b.weight - a.weight);
        
      const modelHoldings = modelItems.map(i => i.symbol);
      createChart('model-concentration-chart', modelItems, true, modelHoldings);
    }
    
    // Model Sector Chart
    const modelSectorsData = dashboard.model?.composition?.sector_exposure;
    if (modelSectorsData && modelSectorsData.length > 0) {
      const modelSectors = modelSectorsData.map(s => ({symbol: s.sector, weight: s.pct}));
      createChart('model-sector-concentration-chart', modelSectors);
    }

  } catch (err) {
    console.error('Risk render error:', err);
    document.getElementById('cards-stress').innerHTML =
      `<div class="card"><span class="loading" style="color:var(--brand-red)">Erro: ${err.message}</span></div>`;
  }
}

render();
</script>
</body>
</html>
