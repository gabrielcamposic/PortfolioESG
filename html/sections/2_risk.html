<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 — Risco</title>
<link rel="stylesheet" href="../css/base.css">
<script src="../js/header.js" data-page="risk"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>

  /* ── Card grid ── */
  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }


  /* ── Table ── */
  .table-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .table-card .table-title {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .risk-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .risk-table th {
    text-align: right;
    font-weight: 400;
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
  }
  .risk-table th:first-child { text-align: left; }
  .risk-table td {
    text-align: right;
    padding: 8px 12px;
    border-bottom: 1px solid rgba(42,46,61,0.3);
    color: var(--text-primary);
  }
  .risk-table td:first-child {
    text-align: left;
    color: var(--text-secondary);
    font-size: 12px;
  }
  .risk-table tr:last-child td { border-bottom: none; }
  .risk-table tr.row-all td {
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  /* ── Bar chart ── */
  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .chart-card .chart-title {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .bar-chart-wrapper { position: relative; height: 280px; }

  /* ── Duo Charts Layout ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 800px) {
    .charts-row { grid-template-columns: 1fr; }
    .bar-chart-wrapper { height: 220px; }
  }
</style>
</head>
<body>

<div class="period-header" id="period-header"></div>

<!-- Raio-X de Risco Histórico -->
<div class="table-card" style="background: transparent; border: none; padding: 0;">
  <div class="table-title" style="padding-left: 5px;">Raio-X de Estresse Histórico (Carteira Real)</div>
  <div class="cards-row" id="cards-stress">
    <div class="card"><span class="loading">Carregando...</span></div>
  </div>
</div>

<!-- Comparativo Atual vs Modelo -->
<div class="table-card">
  <div class="table-title">Comparativo de Risco (Carteira Atual vs. Modelo Proposto)</div>
  <div id="compare-table-container"><span class="loading">Carregando...</span></div>
</div>

<!-- Dual Concentration bar charts (Setores) -->
<div class="charts-row">
  <div class="chart-card">
    <div class="chart-title">Alocação por Setor (Carteira Atual)</div>
    <div class="bar-chart-wrapper">
      <canvas id="sector-concentration-chart"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Alocação por Setor (Modelo Proposto)</div>
    <div class="bar-chart-wrapper">
      <canvas id="model-sector-concentration-chart"></canvas>
    </div>
  </div>
</div>

<!-- Dual Concentration bar charts (Ativos) -->
<div class="charts-row">
  <div class="chart-card">
    <div class="chart-title">Alocação por Ativo (Carteira Atual)</div>
    <div class="bar-chart-wrapper">
      <canvas id="concentration-chart"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Alocação por Ativo (Modelo Proposto)</div>
    <div class="bar-chart-wrapper">
      <canvas id="model-concentration-chart"></canvas>
    </div>
  </div>
</div>

<script>
const DATA_BASE = '../data';

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v * 100).toFixed(2) + '%';
}
function fmtNum(v, d = 2) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(d);
}
function fmtHHI(v) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(4);
}
function hhiLabel(v) {
  if (v == null || isNaN(v)) return '';
  if (v < 0.10) return 'diversificado';
  if (v <= 0.25) return 'moderado';
  return 'concentrado';
}

function card(label, value, sub) {
  return `<div class="card">
    <div class="label">${label}</div>
    <div class="value">${value}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

async function render() {
  try {
    const [dashboard, positions, recommendation] = await Promise.all([
      fetch(`${DATA_BASE}/dashboard_latest.json`).then(r => r.json()),
      fetch(`${DATA_BASE}/ledger_positions.json`).then(r => r.json()),
      fetch(`${DATA_BASE}/optimized_recommendation.json`).then(r => r.json()).catch(() => ({}))
    ]);

    const real = dashboard.real || {};
    const meta = real.meta || {};
    const rw   = real.risk_windows || {};
    const all  = rw.All || {};

    // ── Period header ──
    const MO = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    if (meta.history_start && meta.history_end) {
      const [sy,sm] = meta.history_start.split('-');
      const [ey,em] = meta.history_end.split('-');
      document.getElementById('period-header').innerHTML =
        `Período de análise · <span class="dates">${MO[+sm-1]}/${sy.slice(2)} – ${MO[+em-1]}/${ey.slice(2)} · ${meta.trading_days||'?'} pregões</span>`;
    }

    // ── Tabela de Confronto (Atual vs Modelo) ──
    const t_vol_real = dashboard.real.twr?.volatility ? fmtPct(dashboard.real.twr.volatility) : '—';
    const t_vol_mod  = dashboard.model.risk?.volatility_annual ? fmtPct(dashboard.model.risk.volatility_annual / 100) : '—';
    const t_shp_real = dashboard.real.twr?.sharpe ? fmtNum(dashboard.real.twr.sharpe) : '—';
    const t_shp_mod  = dashboard.model.risk?.sharpe ? fmtNum(dashboard.model.risk.sharpe) : '—';
    const t_hhi_real = dashboard.real.structure?.hhi ? fmtHHI(dashboard.real.structure.hhi) : '—';
    const t_hhi_mod  = dashboard.model.risk?.hhi ? fmtHHI(dashboard.model.risk.hhi) : '—';

    let compareHtml = `<table class="risk-table">
      <thead>
        <tr><th>Indicador</th><th>Carteira Atual</th><th>Modelo Proposto</th></tr>
      </thead>
      <tbody>
        <tr><td>Volatilidade Anualizada</td><td>${t_vol_real}</td><td>${t_vol_mod}</td></tr>
        <tr><td>Índice Sharpe</td><td>${t_shp_real}</td><td>${t_shp_mod}</td></tr>
        <tr style="border-bottom:none"><td>Concentração (HHI)</td><td>${t_hhi_real}</td><td>${t_hhi_mod}</td></tr>
      </tbody>
    </table>`;
    document.getElementById('compare-table-container').innerHTML = compareHtml;

    // ── Cards de Estresse Histórico (Real) ──
    const max_dd = dashboard.real.twr?.max_drawdown ? fmtPct(-dashboard.real.twr.max_drawdown) : '—';
    const beta = dashboard.real.relative?.beta ? fmtNum(dashboard.real.relative.beta) : '—';
    const sortino = dashboard.real.twr?.sortino ? fmtNum(dashboard.real.twr.sortino) : '—';
    
    // Novas métricas (Tracking Error e Info Ratio da janela All)
    const te = all.tracking_error != null ? fmtPct(all.tracking_error) : '—';
    const ir = all.information_ratio != null ? fmtNum(all.information_ratio) : '—';

    document.getElementById('cards-stress').innerHTML =
      card('Max Drawdown', max_dd, 'pior queda do topo') +
      card('Beta (vs. IBOV)', beta, 'risco direcional') +
      card('Sortino Ratio', sortino, 'ret. ajustado a queda') +
      card('Tracking Error', te, 'desvio do IBOV') +
      card('Info Ratio', ir, 'alfa / tracking error');

    // ── Concentration bar charts ──
    const totalMarket = positions.total_current_market || 0;
    
    function createChart(ctxId, items, color) {
      if (!document.getElementById(ctxId) || !items || items.length === 0) return;
      new Chart(document.getElementById(ctxId).getContext('2d'), {
        type: 'bar',
        data: {
          labels: items.map(i => i.symbol),
          datasets: [{
            label: 'Peso (%)',
            data: items.map(i => +(i.weight * 100).toFixed(2)),
            backgroundColor: color,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          scales: {
            x: {
              ticks: { color: '#8b93a5', font: { size: 10, family: "'SF Mono',monospace" }, callback: v => v + '%' },
              grid: { color: 'rgba(0,0,0,0.06)' },
            },
            y: {
              ticks: { color: '#4b5468', font: { size: 11 } },
              grid: { display: false },
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#ffffff', borderColor: '#dde1ea', borderWidth: 1,
              titleColor: '#1c1f2e', bodyColor: '#4b5468',
              bodyFont: { family: "'SF Mono',monospace", size: 12 },
              callbacks: { label: ctx => `${ctx.parsed.x.toFixed(2)}%` }
            }
          }
        }
      });
    }

    if (positions.positions && totalMarket > 0) {
      const realItems = positions.positions
        .map(p => ({
          symbol: (p.resolved_symbol || p.symbol || '').replace('.SA', ''),
          weight: (p.net_qty * p.current_price) / totalMarket,
        }))
        .filter(p => p.weight > 0)
        .sort((a, b) => b.weight - a.weight);
      
      createChart('concentration-chart', realItems, '#1971c2');
    }
    
    // Real Sector Chart
    const realSectorsData = dashboard.real?.structure?.sector_exposure;
    if (realSectorsData && realSectorsData.length > 0) {
      const realSectors = realSectorsData.map(s => ({symbol: s.sector, weight: s.pct}));
      createChart('sector-concentration-chart', realSectors, '#5c6ac4');
    }

    // Model Position Chart
    const modelWeights = recommendation?.comparison?.optimal?.weights || recommendation?.comparison?.ideal?.weights;
    if (modelWeights) {
      const modelItems = Object.entries(modelWeights)
        .map(([sym, w]) => ({ symbol: sym.replace('.SA', ''), weight: w }))
        .filter(p => p.weight > 0)
        .sort((a, b) => b.weight - a.weight);
        
      createChart('model-concentration-chart', modelItems, '#1098AD');
    }
    
    // Model Sector Chart
    const modelSectorsData = dashboard.model?.composition?.sector_exposure;
    if (modelSectorsData && modelSectorsData.length > 0) {
      const modelSectors = modelSectorsData.map(s => ({symbol: s.sector, weight: s.pct}));
      createChart('model-sector-concentration-chart', modelSectors, '#0ca678');
    }

  } catch (err) {
    document.getElementById('cards-stress').innerHTML =
      `<div class="card"><span class="loading" style="color:var(--accent-red)">Erro: ${err.message}</span></div>`;
  }
}

render();
</script>
</body>
</html>
