<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 — Header / Status Bar</title>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-card: #1a1d27;
    --bg-card-hover: #222633;
    --border: #2a2e3d;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0ac;
    --text-muted: #636978;
    --accent-blue: #4dabf7;
    --accent-green: #51cf66;
    --accent-red: #ff6b6b;
    --accent-yellow: #ffd43b;
    --accent-orange: #ff922b;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-sans);
    padding: 16px;
  }

  /* ── Header Bar ── */
  .header-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .header-logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text-primary);
    white-space: nowrap;
  }
  .header-logo span { color: var(--accent-blue); }

  .header-separator {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  /* ── Run info ── */
  .run-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .run-info .label { color: var(--text-muted); }
  .run-info .value {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* ── Pipeline status ── */
  .pipeline-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.completed { background: var(--accent-green); }
  .status-dot.running {
    background: var(--accent-yellow);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .status-dot.error { background: var(--accent-red); }
  .status-dot.idle { background: var(--text-muted); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text { color: var(--text-secondary); }

  /* ── Decision badge ── */
  .decision-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .decision-badge.rebalance {
    background: rgba(255, 107, 107, 0.15);
    color: var(--accent-red);
    border: 1px solid rgba(255, 107, 107, 0.3);
  }
  .decision-badge.hold {
    background: rgba(81, 207, 102, 0.15);
    color: var(--accent-green);
    border: 1px solid rgba(81, 207, 102, 0.3);
  }

  /* ── Portfolio value ── */
  .portfolio-value {
    margin-left: auto;
    text-align: right;
  }
  .portfolio-value .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .portfolio-value .amount {
    font-size: 20px;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--text-primary);
  }
  .portfolio-value .pnl {
    font-size: 12px;
    font-family: var(--font-mono);
  }
  .portfolio-value .pnl.positive { color: var(--accent-green); }
  .portfolio-value .pnl.negative { color: var(--accent-red); }

  /* ── Loading / Error states ── */
  .loading { color: var(--text-muted); font-style: italic; font-size: 13px; }
  .error-msg { color: var(--accent-red); font-size: 13px; }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    .header-bar { padding: 12px 14px; gap: 8px; }
    .header-separator { display: none; }
    .portfolio-value { margin-left: 0; width: 100%; text-align: left; margin-top: 4px; }
    .run-info { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="header-bar" id="header-bar">
  <div class="header-logo">Portfolio<span>ESG</span></div>
  <div class="header-separator"></div>

  <div class="run-info" id="run-info">
    <span class="loading">Carregando...</span>
  </div>

  <div class="header-separator"></div>

  <div id="pipeline-status" class="pipeline-status">
    <div class="status-dot idle"></div>
    <span class="status-text">—</span>
  </div>

  <div id="decision-container"></div>

  <div class="portfolio-value" id="portfolio-value">
    <div class="label">Patrimônio Real</div>
    <div class="amount">—</div>
  </div>
</div>

<script>
const DATA_BASE = '../data';

// ── Formatters ──
function fmtBRL(v) {
  if (v == null || isNaN(v)) return '—';
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v * 100).toFixed(2) + '%';
}

function fmtRunId(rid) {
  if (!rid) return '—';
  // 20260312-065341 → 12/03/2026 06:53
  const m = rid.match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/);
  if (!m) return rid;
  return `${m[3]}/${m[2]}/${m[1]} ${m[4]}:${m[5]}`;
}

function fmtTimestamp(ts) {
  if (!ts) return '';
  // "2026-03-12 07:16:20" → "12/03/2026 07:16"
  const d = new Date(ts.replace(' ', 'T'));
  if (isNaN(d)) return ts;
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

// ── Fetch helpers ──
async function fetchJSON(file) {
  const r = await fetch(`${DATA_BASE}/${file}`);
  if (!r.ok) throw new Error(`${file}: ${r.status}`);
  return r.json();
}

// ── Render ──
async function render() {
  try {
    const [dashboard, positions, progress] = await Promise.all([
      fetchJSON('dashboard_latest.json'),
      fetchJSON('ledger_positions.json'),
      fetchJSON('pipeline_progress.json').catch(() => null),
    ]);

    // Run info
    const runId = dashboard.model?.meta?.run_id;
    const timestamp = dashboard.model?.meta?.timestamp;
    const runInfoEl = document.getElementById('run-info');
    runInfoEl.innerHTML = `
      <span class="label">Run:</span>
      <span class="value">${runId || '—'}</span>
      <span class="label" style="margin-left:4px">em</span>
      <span class="value">${fmtRunId(runId)}</span>
    `;

    // Pipeline status
    const statusEl = document.getElementById('pipeline-status');
    const pStatus = progress?.pipeline_run_status;
    if (pStatus) {
      const stage = (pStatus.current_stage || '').toLowerCase();
      let dotClass = 'idle';
      let text = pStatus.status_message || pStatus.current_stage || 'Desconhecido';
      if (stage === 'completed' || pStatus.status_message === 'Completed') {
        dotClass = 'completed';
        text = 'Concluído';
      } else if (pStatus.end_time) {
        dotClass = 'completed';
      } else if (pStatus.start_time && !pStatus.end_time) {
        dotClass = 'running';
        text = pStatus.current_stage || 'Em execução...';
      }
      statusEl.innerHTML = `
        <div class="status-dot ${dotClass}"></div>
        <span class="status-text">${text}</span>
      `;
    }

    // Decision badge
    const verdict = dashboard.model?.decision?.verdict;
    if (verdict) {
      const cls = verdict.toUpperCase() === 'REBALANCE' ? 'rebalance' : 'hold';
      const label = verdict.toUpperCase() === 'REBALANCE' ? 'Rebalancear' : 'Manter';
      document.getElementById('decision-container').innerHTML =
        `<span class="decision-badge ${cls}">${label}</span>`;
    }

    // Portfolio value
    const market = positions.total_current_market;
    const invested = positions.total_invested_cash;
    const pnl = positions.total_unrealized_pnl;
    const pvEl = document.getElementById('portfolio-value');
    const pnlClass = pnl >= 0 ? 'positive' : 'negative';
    const pnlSign = pnl >= 0 ? '+' : '';
    const pnlPct = invested ? pnl / invested : 0;
    pvEl.innerHTML = `
      <div class="label">Patrimônio Real</div>
      <div class="amount">${fmtBRL(market)}</div>
      <div class="pnl ${pnlClass}">${pnlSign}${fmtBRL(pnl)} (${pnlSign}${fmtPct(pnlPct)})</div>
    `;

  } catch (err) {
    console.error('Header render error:', err);
    document.getElementById('run-info').innerHTML =
      `<span class="error-msg">Erro ao carregar dados: ${err.message}</span>`;
  }
}

render();
</script>
</body>
</html>
