<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03 — Portfólio Modelo</title>
<link rel="stylesheet" href="../css/base.css">
<script src="../js/header.js" data-page="model"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  /* ── Dashboard Layout Grids ── */
  .cards-grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeInUp 0.6s ease forwards;
  }

  /* card override for this page */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px;
    box-shadow: var(--shadow-sm);
    height: 100%;
    transition: all 0.3s ease;
  }
  .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

  .section-title {
    font-size: 11px;
    font-weight: var(--font-weight-emphasis);
    color: var(--text-primary);
    margin-bottom: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
    border-left: 4px solid var(--brand-red);
    padding: 2px 0 2px 12px;
  }

  .card-header {
    font-size: 10.5px; font-weight: var(--font-weight-emphasis); text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-primary); margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-strong);
  }
  
  .badge {
    padding: 4px 12px; border-radius: 20px; font-size: 9px;
    letter-spacing: 0.02em; font-weight: var(--font-weight-emphasis); color: #fff; box-shadow: var(--shadow-sm);
  }
  .badge.rebalance { background: var(--bg-negative); color: var(--color-negative); border: 1px solid var(--color-negative); }
  .badge.hold { background: var(--bg-positive); color: var(--color-positive); border: 1px solid var(--color-positive); }
  .badge.watch { background: rgba(199, 143, 64, 0.12); color: var(--color-amber); border: 1px solid rgba(199, 143, 64, 0.35); }
  .badge.partial_rebalance { background: rgba(79, 140, 201, 0.12); color: var(--brand-blue); border: 1px solid rgba(79, 140, 201, 0.35); }


  /* ── Return comparison ── */
  .return-comparison { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; margin-bottom: 16px; }
  .rc-box { background: var(--bg-card-alt); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; transition: all 0.3s ease; }
  .rc-box--model { border-color: var(--brand-blue); background: rgba(79, 140, 201, 0.06); }
  .rc-label { font-size: 9px; text-transform: uppercase; font-weight: var(--font-weight-emphasis); color: var(--color-label); margin-bottom: 4px; letter-spacing: 0.08em; }
  .rc-value { font-family: var(--font-sans); font-size: 24px; font-weight: var(--font-weight-light); color: var(--text-primary); line-height: 1; margin-bottom: 4px; letter-spacing: -0.5px; }
  .rc-sub { font-size: 11px; color: var(--text-secondary); font-weight: var(--font-weight-emphasis); font-family: var(--font-sans); }
  
  .rc-middle { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .rc-excess { font-family: var(--font-sans); font-weight: var(--font-weight-emphasis); font-size: 16px; }
  .rc-excess-label { font-size: 9px; text-transform: uppercase; font-weight: var(--font-weight-emphasis); color: var(--color-label); letter-spacing: 0.08em; }

  /* ── Shadow Gate ── */
  .shadow-panel { margin: 12px 0 16px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-card-alt); padding: 12px; }
  .shadow-panel.watch { border-color: rgba(199, 143, 64, 0.35); background: rgba(199, 143, 64, 0.08); }
  .shadow-panel.hold { border-color: rgba(46, 125, 50, 0.28); background: rgba(46, 125, 50, 0.07); }
  .shadow-panel.rebalance { border-color: rgba(46, 125, 50, 0.35); background: var(--bg-positive); }
  .shadow-panel.partial_rebalance { border-color: rgba(79, 140, 201, 0.35); background: rgba(79, 140, 201, 0.08); }
  .shadow-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .shadow-title { font-size: 9px; text-transform: uppercase; font-weight: var(--font-weight-emphasis); color: var(--color-label); letter-spacing: 0.08em; margin-bottom: 4px; }
  .shadow-main { color: var(--text-primary); font-size: 15px; font-weight: var(--font-weight-emphasis); }
  .shadow-sub { color: var(--text-secondary); font-size: 11px; line-height: 1.35; margin-top: 3px; }
  .stable-caption { margin-bottom: 10px; }
  .shadow-badge { display: inline-block; padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: var(--font-weight-emphasis); text-transform: uppercase; white-space: nowrap; border: 1px solid var(--border); color: var(--text-muted); background: var(--bg-card); }
  .shadow-badge.watch { color: var(--color-amber); border-color: rgba(199, 143, 64, 0.40); background: rgba(199, 143, 64, 0.12); }
  .shadow-badge.hold { color: var(--color-positive); border-color: rgba(46, 125, 50, 0.35); background: var(--bg-positive); }
  .shadow-badge.rebalance { color: var(--color-positive); border-color: rgba(46, 125, 50, 0.45); background: var(--bg-positive); }
  .shadow-badge.partial_rebalance { color: var(--brand-blue); border-color: rgba(79, 140, 201, 0.40); background: rgba(79, 140, 201, 0.12); }
  .shadow-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 8px; }
  .shadow-metric { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 8px; }
  .shadow-label { display: block; font-size: 9px; font-weight: var(--font-weight-emphasis); color: var(--color-label); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .shadow-value { display: block; font-size: 13px; font-weight: var(--font-weight-emphasis); color: var(--text-primary); }
  .shadow-vetoes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .shadow-veto { border: 1px solid rgba(184, 109, 93, 0.35); color: var(--color-negative); background: rgba(184, 109, 93, 0.08); border-radius: 6px; padding: 4px 7px; font-size: 10px; font-weight: var(--font-weight-emphasis); }
  .execution-block { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .execution-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 8px; margin-bottom: 10px; }
  .execution-table-wrap { overflow-x: auto; }
  .execution-table { table-layout: fixed; min-width: 720px; }
  .execution-table--wide { min-width: 980px; }
  .execution-table td { padding: 7px 8px; font-size: 10.5px; }
  .execution-status { display: inline-block; padding: 3px 7px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card-alt); color: var(--text-muted); font-size: 9px; font-weight: var(--font-weight-emphasis); text-transform: uppercase; white-space: nowrap; }
  .execution-status.execute { color: var(--color-positive); border-color: rgba(46, 125, 50, 0.35); background: var(--bg-positive); }
  .execution-status.monitor, .execution-status.hold { color: var(--color-amber); border-color: rgba(199, 143, 64, 0.35); background: rgba(199, 143, 64, 0.10); }
  .execution-status.defer_budget, .execution-status.defer_max_actions { color: var(--color-negative); border-color: rgba(184, 109, 93, 0.35); background: rgba(184, 109, 93, 0.08); }
  .execution-status.ignore_band, .execution-status.ignore_small { color: var(--text-muted); border-color: var(--border); background: var(--bg-card); }

  /* ── Risk Row ── */
  .risk-section-label { font-size: 9px; text-transform: uppercase; font-weight: var(--font-weight-emphasis); color: var(--color-label); margin-bottom: 8px; padding-top: 14px; border-top: 1px solid var(--border-strong); letter-spacing: 0.08em; }
  .risk-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
  .risk-item { background: var(--bg-card-alt); padding: 8px; border-radius: 8px; }
  .risk-label { font-size: 9px; font-weight: var(--font-weight-emphasis); color: var(--color-label); text-transform: uppercase; margin-bottom: 2px; display: block; letter-spacing: 0.05em; }
  .risk-value { font-family: var(--font-sans); font-size: 13px; font-weight: var(--font-weight-emphasis); color: var(--text-primary); }

  /* ── Return Diagnostics ── */
  .diag-block { margin: 14px 0 16px; padding-top: 14px; border-top: 1px solid var(--border-strong); }
  .diag-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .diag-title { font-size: 9px; text-transform: uppercase; font-weight: var(--font-weight-emphasis); color: var(--color-label); letter-spacing: 0.08em; }
  .diag-chips { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
  .diag-chip { font-size: 10px; font-weight: var(--font-weight-emphasis); color: var(--text-primary); background: var(--bg-card-alt); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; white-space: nowrap; }
  .diag-alert { margin-bottom: 10px; padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(184, 109, 93, 0.35); background: rgba(184, 109, 93, 0.08); color: var(--text-primary); font-size: 11px; font-weight: var(--font-weight-emphasis); line-height: 1.35; }
  .diag-table-wrap { overflow-x: auto; }
  .diag-table { table-layout: fixed; min-width: 940px; }
  .diag-table td { padding: 8px 10px; font-size: 11px; }
  .diag-table td:first-child { font-size: 12px; }
  .source-pill { display: inline-block; max-width: 145px; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; padding: 3px 7px; border-radius: 6px; background: rgba(79, 140, 201, 0.10); color: var(--brand-blue); font-size: 9px; font-weight: var(--font-weight-emphasis); white-space: nowrap; }
  .source-pill.fallback { background: rgba(184, 109, 93, 0.10); color: var(--color-negative); }
  .source-pill.historical { background: hsla(210, 15%, 45%, 0.12); color: var(--text-muted); }
  .quality-badge { display: inline-block; padding: 3px 7px; border-radius: 6px; font-size: 9px; font-weight: var(--font-weight-emphasis); text-transform: uppercase; white-space: nowrap; border: 1px solid var(--border); background: var(--bg-card-alt); color: var(--text-muted); }
  .quality-badge.high { background: var(--bg-positive); color: var(--color-positive); border-color: rgba(46, 125, 50, 0.35); }
  .quality-badge.medium { background: rgba(79, 140, 201, 0.10); color: var(--brand-blue); border-color: rgba(79, 140, 201, 0.35); }
  .quality-badge.low { background: rgba(199, 143, 64, 0.12); color: var(--color-amber); border-color: rgba(199, 143, 64, 0.35); }
  .quality-badge.reject { background: var(--bg-negative); color: var(--color-negative); border-color: rgba(184, 109, 93, 0.35); }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr.group-headers th { padding: 8px 10px; font-size: 8px; text-transform: uppercase; font-weight: var(--font-weight-emphasis); letter-spacing: 1px; color: var(--color-label); }
  thead tr.main-headers th { padding: 8px 10px; font-size: 9px; font-weight: var(--font-weight-emphasis); text-transform: uppercase; color: var(--color-label); border-bottom: 1px solid var(--border-strong); letter-spacing: 0.1em; }

  td { padding: 10px; font-family: var(--font-sans); font-size: 12px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
  td:first-child { font-family: var(--font-sans); font-weight: var(--font-weight-emphasis); font-size: 13px; color: var(--brand-blue); }
  
  tr.totals td { background: var(--bg-card-alt); color: var(--text-primary); font-weight: var(--font-weight-emphasis); border-top: 2px solid var(--border-strong); }

  .group-fwd { background: rgba(79, 140, 201, 0.10) !important; color: var(--brand-blue) !important; border-radius: 8px 8px 0 0; }
  .group-bwd { background: hsla(210, 15%, 45%, 0.1) !important; color: var(--text-muted) !important; border-radius: 8px 8px 0 0; }
  .sep-fwd { border-left: 2px solid rgba(79, 140, 201, 0.12) !important; }
  .sep-bwd { border-left: 2px solid hsla(210, 15%, 45%, 0.1) !important; }


  /* Cells */
  .cell-score { display: inline-block; padding: 4px 10px; border-radius: 12px; background: rgba(79, 140, 201, 0.10); color: var(--brand-blue); font-weight: var(--font-weight-emphasis); font-size: 11px; }
  .action-badge { padding: 4px 10px; border-radius: 6px; font-size: 9px; font-weight: var(--font-weight-emphasis); text-transform: uppercase; letter-spacing: 0.05em; }
  .action-badge.buy  { background: var(--bg-positive); color: var(--color-positive); }
  .action-badge.sell { background: var(--bg-negative); color: var(--color-negative); }

  .action-badge.hold { background: var(--bg-card-alt); color: var(--text-muted); border: 1px solid var(--border); }

  /* Heatmap */
  .corr-legend {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin: 6px 0 12px;
    color: var(--text-secondary);
    font-size: 10px;
    font-weight: var(--font-weight-emphasis);
  }
  .corr-grp-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card-alt);
  }
  .corr-grp-tag::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
  }
  .corr-grp-tag.holdings { color: var(--brand-blue); }
  .corr-grp-tag.both { color: var(--color-teal); }
  .corr-grp-tag.model { color: var(--color-amber); }
  .corr-scale-label {
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-label);
  }
  .corr-scale {
    display: inline-grid;
    grid-template-columns: auto 120px auto;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 10px;
  }
  .corr-scale-bar {
    height: 9px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: linear-gradient(90deg, #B86D5D 0%, #F5F0E8 50%, #3F78AE 100%);
  }
  .corr-table-wrap { overflow-x: auto; margin-top: 10px; padding-bottom: 4px; }
  .corr-table { border-collapse: separate; border-spacing: 2px; table-layout: fixed; width: auto; }
  .corr-table td, .corr-table th { border: none !important; }
  .corr-table .ch {
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    height: 92px;
    text-align: left;
    vertical-align: bottom;
    padding: 6px 4px;
    font-size: 10px;
    font-weight: var(--font-weight-emphasis);
    color: var(--text-secondary);
  }
  .corr-table .rh {
    text-align: right;
    padding: 4px 12px;
    font-size: 10px;
    font-weight: var(--font-weight-emphasis);
    width: 86px;
    color: var(--text-secondary);
    border-right: 1px solid var(--border) !important;
  }
  .corr-table .holdings { color: var(--brand-blue); }
  .corr-table .both { color: var(--color-teal); }
  .corr-table .model { color: var(--color-amber); }
  .corr-table td.cv {
    width: 38px;
    height: 34px;
    text-align: center;
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 650;
    padding: 0;
    border: 1px solid rgba(255,255,255,0.5) !important;
    border-radius: 4px;
  }
  .corr-table td.cv.strong { font-weight: 800; }
  .corr-table td.cv.diag {
    color: var(--color-label) !important;
    background: rgba(138,122,101,0.12) !important;
  }
  .corr-note {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: var(--font-weight-emphasis);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  
  @media (max-width: 1024px) {
    .cards-grid { grid-template-columns: 1fr; }
    .return-comparison { grid-template-columns: 1fr; }
    .rc-middle { flex-direction: row; justify-content: space-between; padding: 8px; border-radius: 8px; background: var(--bg-card-alt); }
  }
</style>
</head>
<body>

<div class="section-title">Portfólio Modelo (Forward)</div>

<div class="cards-grid">
  <div class="card" id="summary-card"><span class="loading">Carregando modelo...</span></div>
  <div class="card">
    <div class="card-header">Exposição por Setor</div>
    <div class="chart-container"><canvas id="sector-chart"></canvas></div>
  </div>
</div>

<div class="card">
  <div class="card-header">Alocação do Modelo</div>
  <div id="allocation-table"><span class="loading">Carregando alocação...</span></div>
</div>

<div class="card">
  <div class="card-header">Correlação — Carteira Atual vs. Modelo</div>
  <div id="corr-heatmap"><span class="loading">Carregando correlações...</span></div>
</div>

<div class="card">
  <div class="card-header">Plano de Execução</div>
  <div id="tx-table"><span class="loading">Carregando recomendações...</span></div>
</div>

<script type="module">
import { DC, plColor, assetColor, interpHeatmap } from '../js/data-colors.js';

const DATA_BASE = '../data';

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return `${Number(v).toFixed(2)}%`;
}
function fmtSignedPct(v) {
  if (v == null || isNaN(v)) return '—';
  const value = Number(v);
  return `${value > 0 ? '+' : ''}${value.toFixed(2)}%`;
}
function fmtBRL(v) {
  if (v == null || isNaN(v)) return '—';
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtNum(v, d = 0) {
  if (v == null || isNaN(v)) return '—';
  return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

async function fetchJSON(file) {
  const r = await fetch(`${DATA_BASE}/${file}`);
  if (!r.ok) throw new Error(`${file}: ${r.status}`);
  return r.json();
}

function sourceClass(source) {
  if (!source) return '';
  if (source.includes('Fallback')) return 'fallback';
  if (source.includes('Historical')) return 'historical';
  return '';
}
function qualityClass(bucket) {
  return ['high', 'medium', 'low', 'reject'].includes(bucket) ? bucket : '';
}

function renderReturnDiagnostics(dashboard, recommendation) {
  const diag = recommendation?.diagnostics || dashboard.model?.diagnostics || {};
  const contributors = diag.return_contributors?.optimal || [];
  if (!contributors.length) return '';

  const optimalConc = diag.return_concentration?.optimal || {};
  const qualitySummary = diag.target_quality_summary?.optimal || [];
  const adjustedSummary = diag.adjusted_returns?.optimal || {};
  const lowRejectReturn = qualitySummary
    .filter(row => ['low', 'reject'].includes(row.bucket))
    .reduce((sum, row) => sum + (row.return_contribution_pct || 0), 0);
  const holdConc = diag.return_concentration?.holdings || {};
  const top2 = optimalConc.top2_contribution_pct;
  const holdTop2 = holdConc.top2_contribution_pct;
  const rows = contributors.slice(0, 5);
  const alert = top2 != null && top2 > 50
    ? `<div class="diag-alert">Top 2 ativos explicam ${fmtNum(top2, 1)}% do retorno esperado do modelo${holdTop2 != null ? `; na carteira atual, ${fmtNum(holdTop2, 1)}%` : ''}.</div>`
    : '';

  return `
    <div class="diag-block">
      <div class="diag-head">
        <div class="diag-title">Origem do Retorno Esperado</div>
        <div class="diag-chips">
          <div class="diag-chip">Bruto: ${fmtPct(adjustedSummary.raw_expected_return_pct ?? optimalConc.expected_return_pct)}</div>
          <div class="diag-chip">Ajustado: ${fmtPct(adjustedSummary.adjusted_expected_return_pct)}</div>
          <div class="diag-chip">Redução: ${fmtPct(adjustedSummary.adjusted_return_reduction_pct)}</div>
          <div class="diag-chip">Top 5: ${fmtNum(optimalConc.top5_contribution_pct, 1)}% · Low/Reject: ${fmtPct(lowRejectReturn)}</div>
        </div>
      </div>
      ${alert}
      <div class="diag-table-wrap">
        <table class="diag-table">
          <thead>
            <tr class="main-headers">
              <th>Ativo</th>
              <th class="right">Peso</th>
              <th class="right">Preço</th>
              <th class="right">Alvo</th>
              <th class="right">Upside</th>
              <th class="right">Contrib.</th>
              <th class="right">Adj.</th>
              <th class="right">Redução</th>
              <th>Fonte</th>
              <th>Qualidade</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => {
              const source = row.target_source || row.return_source || '—';
              const bucket = row.target_quality_bucket || '—';
              const flags = (row.target_quality_flags || []).join(', ');
              const qualityTitle = flags || 'Sem flags de qualidade';
              return `
                <tr>
                  <td>${esc(row.stock).replace('.SA', '')}</td>
                  <td class="right">${fmtPct(row.weight_pct)}</td>
                  <td class="right">${fmtBRL(row.current_price)}</td>
                  <td class="right">${fmtBRL(row.target_price)}</td>
                  <td class="right" style="color:${plColor((row.raw_upside_pct || 0) / 100)}">${fmtPct(row.raw_upside_pct)}</td>
                  <td class="right" style="color:${plColor((row.return_contribution_pct || 0) / 100)}">${fmtPct(row.return_contribution_pct)}</td>
                  <td class="right" style="color:${plColor((row.adjusted_return_contribution_pct || 0) / 100)}">${fmtPct(row.adjusted_return_contribution_pct)}</td>
                  <td class="right">${fmtPct(row.adjusted_return_reduction_contribution_pct)}</td>
                  <td><span class="source-pill ${sourceClass(source)}" title="${esc(source)}">${esc(source)}</span></td>

function renderCorrelation(corr) {
  const el = document.getElementById('corr-heatmap');
  if (!corr || !corr.tickers) {
    el.innerHTML = '<span class="loading">Sem dados de correlação disponíveis.</span>';
    return;
  }

  const { tickers, groups, matrix, window_days, date } = corr;
  const n = tickers.length;
  const labels = tickers.map(t => t.replace('.SA', ''));

  const grpCls = t => ({ both: 'both', model: 'model', holdings: 'holdings' }[groups[t]] || '');

  let html = `
    <div class="corr-legend">
      <span class="corr-grp-tag holdings">Carteira Atual</span>
      <span class="corr-grp-tag both">Ambos</span>
      <span class="corr-grp-tag model">Modelo</span>
      <span class="corr-scale-label">Escala:</span>
      <span class="corr-scale"><span>-1</span><span class="corr-scale-bar"></span><span>+1</span></span>
    </div>
    <div class="corr-table-wrap"><table class="corr-table">
      <thead><tr><th></th>`;

  for (let j = 0; j < n; j++) {
    html += `<th class="ch ${grpCls(tickers[j])}" title="${tickers[j]}">${labels[j]}</th>`;
  }
  html += '</tr></thead><tbody>';

  for (let i = 0; i < n; i++) {
    html += `<tr><th class="rh ${grpCls(tickers[i])}">${labels[i]}</th>`;
    for (let j = 0; j < n; j++) {
      const v = matrix[i][j];
      const isDiag = i === j;
      const contrastV = Math.sign(v || 0) * Math.pow(Math.abs(v || 0), 0.72);
      const bg = isDiag ? 'rgba(138,122,101,0.12)' : interpHeatmap(contrastV);
      const strong = Math.abs(v || 0) >= 0.55;
      const tc = (!isDiag && Math.abs(v || 0) > 0.34) ? '#fff' : 'var(--text-secondary)';
      const disp = isDiag ? '—' : (v != null ? v.toFixed(2) : '—');
      const tip = `${tickers[i]} × ${tickers[j]}: ${v != null ? v.toFixed(4) : 'N/A'}`;
      html += `<td class="cv${isDiag ? ' diag' : ''}${strong ? ' strong' : ''}" style="background:${bg}; color:${tc}" title="${tip}">${disp}</td>`;
    }
    html += '</tr>';
  }

  html += `</tbody></table></div>
    <div class="corr-note">Correlação de Pearson dos retornos diários — ${window_days} pregões até ${date}</div>`;

  el.innerHTML = html;
}

function renderTransactions(recommendation) {
  const plan = recommendation?.shadow?.execution_plan || {};
  if (Array.isArray(plan.actions) && plan.actions.length) {
    const statusRank = {
      EXECUTE: 0,
      MONITOR: 1,
      HOLD: 1,
      DEFER_BUDGET: 2,
      DEFER_MAX_ACTIONS: 2,
      IGNORE_BAND: 3,
      IGNORE_SMALL: 3,
    };
    const actionLabel = action => ({
      BUY: 'Comprar',
      SELL: 'Vender',
    })[action] || (action || '—');
    const sorted = [...plan.actions].sort((a, b) => {
      const rankA = statusRank[a.status] ?? 9;
      const rankB = statusRank[b.status] ?? 9;
      if (rankA !== rankB) return rankA - rankB;
      return Math.abs(b.recommended_value_brl || 0) - Math.abs(a.recommended_value_brl || 0);
    });

    let html = `
      <div class="corr-note" style="margin: 0 0 10px;">${esc(plan.today_action || '')}</div>
      <table class="execution-table execution-table--wide">
        <thead>
          <tr class="main-headers">
            <th>Ativo</th>
            <th>Ação teórica</th>
            <th>Status</th>
            <th class="right">Atual</th>
            <th class="right">Alvo</th>
            <th class="right">Executável</th>
            <th class="right">Qtd.</th>
            <th class="right">Valor teórico</th>
            <th class="right">Valor executável</th>
          </tr>
        </thead>
        <tbody>`;

    for (const row of sorted) {
      const statusClass = String(row.status || '').toLowerCase();
      const qty = row.executable_shares > 0 ? row.executable_shares : null;
      html += `
        <tr>
          <td>${esc(row.symbol || '').replace('.SA', '')}</td>
          <td>${esc(actionLabel(row.action))}</td>
          <td><span class="execution-status ${statusClass}" title="${esc(row.status_reason || '')}">${esc(executionStatusLabel(row.status))}</span></td>
          <td class="right">${fmtPct(row.current_weight_pct)}</td>
          <td class="right">${fmtPct(row.target_weight_pct)}</td>
          <td class="right">${fmtPct(row.executable_weight_pct)}</td>
          <td class="right">${qty != null ? fmtNum(qty) : '—'}</td>
          <td class="right">${fmtBRL(row.recommended_value_brl)}</td>
          <td class="right">${fmtBRL(row.executable_value_brl)}</td>
        </tr>`;
    }

    html += `
        <tr class="totals">
          <td colspan="5">Resumo executável</td>
          <td colspan="2" class="right" style="font-size:10px; color: var(--text-muted); text-transform: uppercase;">
            Teórico ${fmtBRL(plan.theoretical_trade_value_brl)} · Executável ${fmtBRL(plan.executable_trade_value_brl)}
          </td>
          <td class="right">${fmtPct(plan.executable_trade_value_pct)}</td>
          <td class="right">${fmtPct(plan.deferred_trade_value_pct)} adiado</td>
        </tr>
      </tbody></table>`;

    document.getElementById('tx-table').innerHTML = html;
    return;
  }

  const txs = recommendation.transactions || [];
  if (!txs.length) {
    document.getElementById('tx-table').innerHTML = '<span class="loading">Nenhuma transação recomendada.</span>';
    return;
  }
  
  const sorted = [...txs].sort((a, b) => {
    if (a.action === b.action) return Math.abs(b.value_change) - Math.abs(a.value_change);
    return a.action === 'SELL' ? -1 : 1;
  });

  const tickers = sorted.map(t => t.symbol);

  // Transaction summary (from backend or computed here as fallback)
  const summary = recommendation.transaction_summary || {};
  const totalBuy  = summary.total_buy_value  ?? sorted.filter(t => t.action === 'BUY').reduce((s, t) => s + Math.abs(t.value_change || 0), 0);
  const totalSell = summary.total_sell_value ?? sorted.filter(t => t.action === 'SELL').reduce((s, t) => s + Math.abs(t.value_change || 0), 0);
  const totalCost = summary.total_cost ?? sorted.reduce((s, t) => s + (t.cost || 0), 0);
  const projectedBalance = summary.projected_balance ?? (totalSell - totalBuy - totalCost);

  let html = `<table>
    <thead><tr>
      <th>Ativo</th>
      <th>Ação</th>
      <th class="right">Qtd.</th>
      <th class="right">Peso Atual</th>
      <th class="right">Peso Alvo</th>
      <th class="right">Δ Peso</th>
      <th class="right">PM Compra</th>
      <th class="right">Preço Atual</th>
      <th class="right">Preço Proj.</th>
      <th class="right">Valor Est.</th>
      <th class="right">Custo Op.</th>
    </tr></thead><tbody>`;

  for (const tx of sorted) {
    const isBuy = tx.action === 'BUY';
    const isSell = tx.action === 'SELL';
    const cls = isBuy ? 'buy' : isSell ? 'sell' : 'hold';
    const label = isBuy ? 'Comprar' : isSell ? 'Vender' : tx.action;
    const delta = (tx.weight_change || 0) * 100;
    const deltaColor = plColor(tx.weight_change);
    const tickerC = assetColor(tx.symbol, tickers);

    html += `<tr>
      <td style="color: ${tickerC}; font-weight: 600;">${tx.symbol}</td>
      <td><span class="action-badge ${cls}">${label}</span></td>
      <td class="right">${tx.shares != null ? fmtNum(tx.shares) : '—'}</td>
      <td class="right">${fmtPct((tx.current_weight || 0) * 100)}</td>
      <td class="right">${fmtPct((tx.target_weight || 0) * 100)}</td>
      <td class="right" style="color: ${deltaColor}; font-weight: 600;">${delta >= 0 ? '+' : ''}${fmtPct(delta)}</td>
      <td class="right">${tx.avg_purchase_price != null ? fmtBRL(tx.avg_purchase_price) : '—'}</td>
      <td class="right">${tx.current_price != null ? fmtBRL(tx.current_price) : '—'}</td>
      <td class="right">${tx.target_price != null ? fmtBRL(tx.target_price) : '—'}</td>
      <td class="right">${fmtBRL(Math.abs(tx.value_change))}</td>
      <td class="right">${tx.cost != null ? fmtBRL(tx.cost) : '—'}</td>
    </tr>`;
  }

  // Summary rows
  const balanceColor = projectedBalance >= 0 ? 'var(--color-positive)' : 'var(--color-negative)';
  const balanceBg    = projectedBalance >= 0 ? 'var(--bg-positive)' : 'var(--bg-negative)';
  const balanceLabel = projectedBalance >= 0 ? 'Saldo p/ reinvestir' : 'Aporte necessário';

  html += `
    <tr class="totals">
      <td colspan="5">Resumo</td>
      <td colspan="4" class="right" style="font-size:10px; color: var(--text-muted); text-transform: uppercase;">
        Compras ${fmtBRL(totalBuy)} &nbsp;·&nbsp; Vendas ${fmtBRL(totalSell)}
      </td>
      <td class="right">${fmtBRL(totalBuy + totalSell)}</td>
      <td class="right">${fmtBRL(totalCost)}</td>
    </tr>
    <tr class="totals">
      <td colspan="9" class="right" style="font-size: 11px; font-weight: 600;">${balanceLabel}</td>
      <td colspan="2" class="right" style="color: ${balanceColor}; font-weight: 700; font-size: 14px;">
        <span style="display: inline-block; padding: 4px 12px; border-radius: 8px; background: ${balanceBg};">
          ${projectedBalance >= 0 ? '+' : ''}${fmtBRL(projectedBalance)}
        </span>
      </td>
    </tr>`;

  html += '</tbody></table>';
  document.getElementById('tx-table').innerHTML = html;
}

async function render() {
  try {
    const [dashboard, pipeline, recommendation] = await Promise.all([
      fetchJSON('dashboard_latest.json'),
      fetchJSON('pipeline_latest.json'),
      fetchJSON('optimized_recommendation.json'),
    ]);
    renderSummary(dashboard, recommendation);
    renderSectors(dashboard);
    renderAllocation(pipeline);
    renderTransactions(recommendation);
  } catch (err) {
    console.error('Model page error:', err);
    document.getElementById('summary-card').innerHTML = `<span class="loading" style="color:var(--brand-red)">Erro: ${err.message}</span>`;
  }

  try {
    const corr = await fetchJSON('correlation_model_portfolio.json');
    renderCorrelation(corr);
  } catch (err) {
    console.warn('Correlation data unavailable:', err.message);
    renderCorrelation(null);
  }
}

render();
</script>
</body>
</html>
