<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Consolidado - Portfolio ESG</title>
<link rel="stylesheet" href="../css/base.css">
<style>
  body { margin: 0; padding: 0; background: #fff; font-family: var(--font-sans); }
  .report-header {
    text-align: center;
    padding: 30px 20px;
    background: #fff;
    border-bottom: 2px solid var(--border-strong);
    margin-bottom: 20px;
  }
  .report-header h1 {
    font-size: 28px;
    margin: 0;
    color: var(--text-primary);
    font-weight: 800;
  }
  .report-header p {
    margin: 8px 0 0 0;
    color: var(--text-secondary);
    font-size: 14px;
  }
  iframe {
    width: 100%;
    border: none;
    overflow: hidden;
    margin-bottom: 20px;
    display: block;
    min-height: 800px;
  }
  #print-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.98);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
  }
  .loader {
    border: 4px solid var(--border-strong);
    border-top: 4px solid var(--brand-blue);
    border-radius: 50%;
    width: 48px; height: 48px;
    animation: spin 1s linear infinite;
    margin-bottom: 24px;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  @media print {
    #print-overlay { display: none !important; }
    body { background: #fff; }
    /* Configura cada iframe para imprimir como bloco completo (evita barras de scroll internas no PDF) */
    iframe { margin-bottom: 0; display: block; }
    
    /* Dependendo do navegador, definir height para auto e max-height para none pode ajudar a capturar todo o iframe */
    /* No entanto, o cálculo via JavaScript costuma ser o mais seguro para iframes */
  }
</style>
</head>
<body>

<div id="print-overlay">
  <div class="loader"></div>
  <h2 style="margin:0; font-weight: 800; color: #333;">Gerando Relatório PDF...</h2>
  <p style="color: #666; font-size: 14px;">Carregando bases de dados e renderizando os gráficos.</p>
</div>

<div class="report-header" id="report-title">
  <h1>Relatório Executivo Portfolio ESG</h1>
  <p id="report-date"></p>
</div>

<!-- 
  Carregamos os três módulos principais como iframes simultâneos.
  O script aguarda a renderização deles para unificá-los em um único painel de impressão.
-->
<iframe id="f1" src="1_portfolio.html"></iframe>
<iframe id="f2" src="2_risk.html"></iframe>
<iframe id="f3" src="3_model.html"></iframe>

<script>
  // Seta a data atual
  const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit' };
  document.getElementById('report-date').textContent = "Gerado em: " + new Date().toLocaleDateString('pt-BR', dateOptions);

  let loadedCount = 0;
  const iframes = [document.getElementById('f1'), document.getElementById('f2'), document.getElementById('f3')];
  
  function checkDone() {
    loadedCount++;
    if (loadedCount === 3) {
      // 3 segundos de folga para os fetch() rodarem e os gráficos Chart.js fazerem a animação inicial.
      // Se fosse impresso antes, poderia capturar gráficos vazios.
      setTimeout(() => {
        iframes.forEach(f => {
           try {
             const doc = f.contentWindow.document;
             
             // Oculta os cabeçalhos internos (navegação top bar) de cada página filha.
             const headerWrapper = doc.querySelector('.header-wrapper');
             if (headerWrapper) headerWrapper.style.display = 'none';

             // Ajusta os estilos do body e a altura do iframe para forçar expansão total
             const body = doc.body;
             const html = doc.documentElement;
             body.style.background = '#fff';
             
             // Calcula a maior altura possível do conteúdo e seta no iframe
             const height = Math.max(body.scrollHeight, body.offsetHeight, html.clientHeight, html.scrollHeight, html.offsetHeight);
             f.style.height = (height + 20) + 'px';
           } catch(e) {
             console.error("Erro ao preparar o iframe para impressão:", e);
           }
        });
        
        document.getElementById('print-overlay').style.display = 'none';
        
        // Remove título principal apenas do print se quiser economizar espaço? Não, o título é útil.
        // Dispara o diálogo nativo do sistema operacional para "Imprimir / Salvar como PDF".
        window.print();
        
      }, 3000);
    }
  }

  // Atrela o evento onload de cada iframe
  iframes.forEach(f => {
    f.onload = checkDone;
  });
</script>

</body>
</html>
