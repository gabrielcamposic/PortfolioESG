<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>07 — Scoring ESG</title>
<link rel="stylesheet" href="../css/base.css">
<script src="../js/header.js" data-page="scoring"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
<style>
  .section-title {
    font-size: 9px;
    font-weight: var(--font-weight-emphasis);
    color: var(--color-label);
    margin-bottom: 24px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    border-left: 4px solid var(--brand-red);
    padding: 2px 0 2px 12px;
  }
  .section-title .toggle {
    font-size: 12px; color: var(--text-muted); margin-left: auto; transition: transform 0.2s;
  }
  .section-title .toggle.collapsed { transform: rotate(-90deg); }

  .premium-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 28px;
    box-shadow: var(--shadow-sm);
    opacity: 0;
    transform: translateY(10px);
    animation: fadeInUp 0.6s ease forwards;
  }

  .run-info {
    font-size: 9px; color: var(--color-label); margin-bottom: 20px; font-family: var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: var(--font-weight-emphasis);
  }

  /* ── Custom tooltip ── */
  .tooltip-popup {
    position: fixed; z-index: 9999; pointer-events: none;
    background: rgba(15, 23, 42, 0.95); color: #fff;
    font-size: 11px; font-family: var(--font-sans);
    padding: 10px 14px; border-radius: 10px;
    box-shadow: var(--shadow-lg);
    max-width: 260px; line-height: 1.5; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .tooltip-popup.visible { opacity: 1; transform: translateY(0); }

  /* ── Table ── */
  .table-wrapper { overflow-x: auto; margin: 0 -28px; padding: 0 28px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  tr.grp-row th {
    font-size: 8px; text-transform: uppercase; letter-spacing: 0.12em; padding: 6px 10px;
    border-bottom: none; color: #fff; text-align: center; font-weight: var(--font-weight-emphasis);
  }
  tr.grp-row th.grp-score-inputs { background: var(--brand-blue); border-radius: 8px 8px 0 0; }
  tr.grp-row th.grp-fundamentals { background: var(--text-muted); border-radius: 8px 8px 0 0; }
  tr.grp-row th.grp-prices       { background: var(--color-amber); border-radius: 8px 8px 0 0; }

  tr.grp-row th.grp-empty        { background: transparent; }

  th {
    letter-spacing: 0.1em; color: var(--color-label); padding: 12px 10px;
    border-bottom: 1px solid var(--border-strong); cursor: pointer; user-select: none;
    position: sticky; top: 0; background: var(--bg-card); vertical-align: bottom;
    font-weight: var(--font-weight-emphasis); font-size: 9px; text-transform: uppercase;
  }
  th:hover { color: var(--accent-blue); }
  th.right, td.right { text-align: right; }
  th.center, td.center { text-align: center; }

  td {
    padding: 12px 10px; font-family: var(--font-sans); font-size: 12px;
    border-bottom: 1px solid var(--border); color: var(--text-primary);
  }
  td:first-child { font-family: var(--font-sans); font-weight: var(--font-weight-emphasis); color: var(--brand-blue); font-size: 13px; }
  tr:hover td { background: hsla(240, 100%, 50%, 0.05); }

  /* ── Score bar ── */
  .score-cell { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .score-bar-track {
    width: 60px; height: 6px; background: rgba(0,0,0,0.05);
    border-radius: 10px; overflow: hidden; flex-shrink: 0;
  }
  .score-bar-fill { height: 100%; border-radius: 10px; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2); }

  /* ── Component cells ── */
  .comp-cell { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .comp-raw  { font-size: 12px; font-weight: var(--font-weight-emphasis); color: var(--text-primary); }
  .comp-norm {
    font-size: 10px; color: var(--text-muted); font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .comp-contrib {
    font-size: 10px; font-weight: var(--font-weight-emphasis);
    display: flex; align-items: center; gap: 2px;
  }
  .comp-contrib::before { content: '→'; font-weight: 400; opacity: 0.5; }
  
  .norm-bar-track {
    width: 40px; height: 4px; background: rgba(0,0,0,0.05);
    border-radius: 10px; overflow: hidden;
  }
  .norm-bar-fill { display: block; height: 100%; border-radius: 10px; }

  .th-weight-chip {
    display: inline-block; margin-top: 4px;
    padding: 2px 8px; border-radius: 20px; font-size: 9px;
    font-weight: var(--font-weight-emphasis); background: rgba(0,0,0,0.05); border: 1px solid var(--border-strong);
  }

  .src-badge {
    font-size: 9px; padding: 2px 4px; border-radius: 4px;
    font-family: var(--font-sans); font-weight: var(--font-weight-emphasis);
    background: var(--bg-card); border: 1px solid var(--border-strong); color: var(--text-muted);
  }

  @media (max-width: 800px) {
    .premium-card { padding: 16px; }
    .table-wrapper { margin: 0 -16px; padding: 0 16px; }
  }
</style>

</head>
<body>

<div class="section-title" onclick="toggleSection()">
  Scoring ESG
  <span class="toggle" id="toggle-icon">▼</span>
</div>

<div class="premium-card" id="scoring-section">
  <div id="scoring-container"><span class="loading">Carregando scoring...</span></div>
</div>

<script>
const DATA_BASE = '../data';

let sectionVisible = true;
function toggleSection() {
  sectionVisible = !sectionVisible;
  document.getElementById('scoring-section').style.display = sectionVisible ? 'block' : 'none';
  document.getElementById('toggle-icon').classList.toggle('collapsed', !sectionVisible);
}

function parseCSV(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e),
    });
  });
}

const fmtNum = (v, d = 2) => (v == null || isNaN(v)) ? '—' : v.toFixed(d);
const fmtPct = (v, d = 1) => (v == null || isNaN(v)) ? '—' : (v * 100).toFixed(d) + '%';
const fmtBRL = v => (v == null || isNaN(v)) ? '—'
  : v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const colorClass = v => (v == null || isNaN(v)) ? '' : (v >= 0 ? 'positive' : 'negative');

function scoreColor(score, max) {
  const r = Math.min(score / max, 1);
  // Transition from Amber (low) to Navy (high)
  if (r < 0.5) return 'var(--color-amber)';
  return 'var(--brand-blue)';
}


const REGIME_COLORS = {
  strong_bull:'#2f9e44', bull:'#74c069', neutral:'#adb5bd', bear:'#e67700', strong_bear:'#e03131'
};
const REGIME_LABELS = {
  strong_bull:'Alta Forte', bull:'Alta', neutral:'Neutro', bear:'Baixa', strong_bear:'Baixa Forte'
};
const regimeColor = r => REGIME_COLORS[(r||'').toLowerCase()] || '#adb5bd';
const regimeLabel = r => REGIME_LABELS[(r||'').toLowerCase()] || (r || '—');

// ── Component cell: raw value + normalized bar + weighted contribution ──
function compCell(rawHtml, norm, normCls, weight, contribCls, fillColor) {
  const normPct = Math.min(Math.max((norm || 0) * 100, 0), 100);
  const contrib = (norm != null && weight != null) ? norm * weight : null;
  return `<div class="comp-cell">
    <span class="comp-raw">${rawHtml}</span>
    <span class="comp-norm ${normCls}">
      <span class="norm-bar-track"><span class="norm-bar-fill" style="width:${normPct}%;background:${fillColor || '#adb5bd'}"></span></span>
      norm&nbsp;${fmtNum(norm, 3)}
    </span>
    ${contrib != null
      ? `<span class="comp-contrib ${contribCls}" title="contribuição = norm × peso">${fmtNum(contrib, 3)}</span>`
      : ''}
  </div>`;
}

let sortCol = 'CompositeScore';
let sortAsc = false;
let allRows = [];

function renderTable(weights) {
  const sorted = [...allRows].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
    if (va == null) return 1; if (vb == null) return -1;
    return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });

  const maxScore = Math.max(...allRows.map(r => r.CompositeScore || 0), 1);
  const w_s = weights.sharpe, w_u = weights.upside, w_m = weights.momentum;

  // ── Column definitions ──
  const cols = [
    { key:'Stock',                label:'Ativo',      cls:'' },
    { key:'Sector',               label:'Setor',      cls:'' },
    // Score
    { key:'CompositeScore',       label:'Score',      cls:'right grp-sep' },
    // Score inputs
    { key:'SharpeRatio',         label:'Sharpe',     cls:'right grp-sep', weight: w_s, weightCls:'th-wc-sharpe',   fillColor:'var(--brand-blue)' },
    { key:'PotentialUpside_pct', label:'Upside',     cls:'right',         weight: w_u, weightCls:'th-wc-upside',   fillColor:'var(--brand-blue)' },
    { key:'Momentum',            label:'Momentum',   cls:'right',         weight: w_m, weightCls:'th-wc-momentum', fillColor:'var(--color-amber)' },

    // Fundamentals
    { key:'AnnualizedMeanReturn', label:'Ret. Anual', cls:'right grp-sep' },
    { key:'AnnualizedStdDev',     label:'Vol. Anual', cls:'right' },
    { key:'forwardPE',            label:'P/E Fwd',    cls:'right grp-sep' },
    { key:'SectorMedianPE',       label:'P/E Setor',  cls:'right' },
    { key:'forwardEPS',           label:'EPS Fwd',    cls:'right' },
    // Prices
    { key:'CurrentPrice',         label:'Preço',      cls:'right grp-sep' },
    { key:'TargetPrice',          label:'Alvo',       cls:'right' },
  ];

  // Column group sub-header
  let html = `<div class="table-wrapper"><table><thead>`;
  html += `<tr class="grp-row">
    <th colspan="2" class="grp-empty"></th>
    <th colspan="1" class="grp-empty"></th>
    <th colspan="3" class="grp-score-inputs">Variáveis do Score (raw · norm · contribuição)</th>
    <th colspan="5" class="grp-fundamentals">Fundamentos</th>
    <th colspan="2" class="grp-prices">Preços</th>
  </tr>`;

  // Column header row
  html += `<tr>`;
  for (const c of cols) {
    const arrow = sortCol === c.key ? (sortAsc ? ' ↑' : ' ↓') : '';
    const wHtml = (c.weight != null && c.weightCls)
      ? `<br><span class="th-weight-chip ${c.weightCls}">${fmtNum(c.weight, 3)}</span>` : '';
    const onclick = c.nosort ? '' : `onclick="sortBy('${c.key}')"`;
    html += `<th class="${c.cls}" ${onclick}>${c.label}${arrow}${wHtml}</th>`;
  }
  html += `</tr></thead><tbody>`;

  for (const r of sorted) {
    const score    = r.CompositeScore || 0;
    const barPct   = (score / maxScore) * 100;

    const sharpe     = r.SharpeRatio;
    const sharpeNorm = r.SharpeRatio_norm;
    const upside     = r.PotentialUpside_pct;          // stored as fraction (e.g. 0.15 = 15%)
    const upsideNorm = r.PotentialUpside_pct_norm;
    const momentum   = r.Momentum;                     // stored as fraction
    const momNorm    = r.Momentum_norm;
    const annRet     = r.AnnualizedMeanReturn;
    const annVol     = r.AnnualizedStdDev;

    const srcBadge = r.TargetPriceSource === 'YahooFinance'
      ? `<span class="src-badge src-yahoo" data-tooltip="Yahoo Finance: preço-alvo do consenso de analistas">YF</span>`
      : r.TargetPriceSource === 'SectorPE_Fallback'
        ? `<span class="src-badge src-sectorpe" data-tooltip="P/E Setorial: alvo estimado pelo P/E mediano do setor">PE</span>` : '';

    const safeName = (r.Name || '').replace(/"/g, '&quot;');
    html += `<tr>
      <td class="stock" data-tooltip="${safeName}">${r.Stock || '—'}</td>
      <td class="sector">${r.Sector || '—'}</td>
      <td class="right grp-sep">
        <div class="score-cell">
          <span>${fmtNum(score, 3)}</span>
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width:${barPct}%;background:${scoreColor(score,maxScore)}"></div>
          </div>
        </div>
      </td>
      <td class="right grp-sep">${compCell(fmtNum(sharpe, 4), sharpeNorm, 'norm-sharpe', w_s, 'contrib-sharpe', 'var(--brand-blue)')}</td>
      <td class="right">${compCell(
          `<span class="${colorClass(upside)}">${upside != null ? fmtPct(upside) : '—'}</span>`,
          upsideNorm, 'norm-upside', w_u, 'contrib-upside', 'var(--brand-blue)')}</td>
      <td class="right">${compCell(
          `<span class="${colorClass(momentum)}">${momentum != null ? fmtPct(momentum) : '—'}</span>`,
          momNorm, 'norm-momentum', w_m, 'contrib-momentum', 'var(--brand-magenta)')}</td>

      <td class="right grp-sep ${colorClass(annRet)}">${fmtPct(annRet)}</td>
      <td class="right">${fmtPct(annVol)}</td>
      <td class="right grp-sep">${fmtNum(r.forwardPE, 1)}</td>
      <td class="right">${fmtNum(r.SectorMedianPE, 1)}</td>
      <td class="right">${fmtNum(r.forwardEPS, 2)}</td>
      <td class="right grp-sep">${fmtBRL(r.CurrentPrice)}</td>
      <td class="right">${fmtBRL(r.TargetPrice)}&nbsp;${srcBadge}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  const container = document.getElementById('scoring-container');
  const header = container.querySelector('.scoring-header');
  container.innerHTML = (header ? header.outerHTML : '') + html;
}

window.sortBy = function(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  const header = document.querySelector('.scoring-header');
  const weights = header
    ? { sharpe: +header.dataset.ws, upside: +header.dataset.wu, momentum: +header.dataset.wm }
    : { sharpe: 0, upside: 0, momentum: 0 };
  renderTable(weights);
};

async function render() {
  try {
    const rows = await parseCSV(`${DATA_BASE}/scored_stocks.csv`);

    const runIds = [...new Set(rows.map(r => r.run_id).filter(Boolean))].sort();
    const latestRunId = runIds[runIds.length - 1];

    allRows = rows.filter(r => r.run_id === latestRunId);
    if (!allRows.length) throw new Error('Sem dados para o run mais recente.');

    const sample   = allRows[0];
    const weights  = {
      sharpe:   sample.sharpe_weight_used   ?? 0,
      upside:   sample.upside_weight_used   ?? 0,
      momentum: sample.momentum_weight_used ?? 0,
    };
    const regime  = sample.market_regime    || 'neutral';
    const profile = sample.risk_profile_used || '';
    const runTs   = sample.run_timestamp    || latestRunId;

    const headerHtml = `
      <div class="scoring-header"
           data-ws="${weights.sharpe}" data-wu="${weights.upside}" data-wm="${weights.momentum}">
        <div class="run-info">Run: ${latestRunId} · ${runTs} · ${allRows.length} ativos</div>
      </div>`;

    const container = document.getElementById('scoring-container');
    container.innerHTML = headerHtml;
    renderTable(weights);

  } catch (err) {
    console.error('Scoring error:', err);
    document.getElementById('scoring-container').innerHTML =
      `<span class="loading" style="color:var(--accent-red)">Erro: ${err.message}</span>`;
  }
}

// ── Custom tooltip ──
const _tip = document.createElement('div');
_tip.className = 'tooltip-popup';
document.body.appendChild(_tip);

document.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-tooltip]');
  if (!el) return;
  const text = el.dataset.tooltip;
  if (!text) return;
  _tip.textContent = text;
  _tip.classList.add('visible');
});
document.addEventListener('mousemove', e => {
  if (!_tip.classList.contains('visible')) return;
  const x = e.clientX + 14, y = e.clientY - 8;
  // Keep within viewport
  const maxX = window.innerWidth  - _tip.offsetWidth  - 8;
  const maxY = window.innerHeight - _tip.offsetHeight - 8;
  _tip.style.left = Math.min(x, maxX) + 'px';
  _tip.style.top  = Math.min(y, maxY) + 'px';
});
document.addEventListener('mouseout', e => {
  if (!e.target.closest('[data-tooltip]')) return;
  if (e.relatedTarget && e.relatedTarget.closest('[data-tooltip]')) return;
  _tip.classList.remove('visible');
});

render();
</script>
</body>
</html>
